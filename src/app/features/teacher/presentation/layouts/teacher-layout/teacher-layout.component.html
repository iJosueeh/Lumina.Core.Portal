<div class="min-h-screen bg-[#020617] text-slate-300 font-sans flex overflow-hidden">
    
    <!-- Sidebar -->
    <aside 
        class="fixed inset-y-0 left-0 z-50 w-72 bg-slate-950/40 backdrop-blur-2xl border-r border-white/5 transform transition-transform duration-300 ease-in-out lg:relative lg:translate-x-0"
        [class.-translate-x-full]="!isSidebarOpen()">
        
        <div class="h-full flex flex-col p-6">
            <!-- Logo / Brand -->
            <div class="flex items-center gap-3 mb-12 px-2">
                <div class="w-10 h-10 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(6,182,212,0.3)]">
                  <i class="fas fa-lumina-icon text-white font-black text-xl">L</i>
                </div>
                <div>
                  <h1 class="text-xl font-black text-white tracking-tighter">LUMINA<span class="text-cyan-500">.CORE</span></h1>
                  <p class="text-[9px] font-black text-slate-500 uppercase tracking-[0.2em]">Panel del Docente</p>
                </div>
            </div>

            <!-- Navegación -->
            <nav class="flex-1 space-y-2">
                @for (item of menuItems; track item.route) {
                    <a 
                        [routerLink]="item.route" 
                        routerLinkActive="active-link"
                        (click)="closeSidebar()"
                        class="flex items-center gap-4 px-4 py-4 rounded-2xl text-slate-400 font-bold hover:bg-white/5 hover:text-white transition-all group relative overflow-hidden">
                        
                        <div class="relative z-10 w-5 text-center">
                            <i [class]="'fas fa-' + item.icon + ' group-hover:text-cyan-400 transition-colors'"></i>
                        </div>
                        <span class="relative z-10 text-sm tracking-wide">{{item.label}}</span>
                        
                        <!-- Indicador de Active -->
                        <div class="active-indicator absolute left-0 top-0 bottom-0 w-1 bg-cyan-500 opacity-0 transition-opacity"></div>
                    </a>
                }
            </nav>

            <!-- Perfil del Usuario (Bottom) -->
            <div class="mt-auto pt-6 border-t border-white/5">
                <div class="flex items-center gap-4 p-4 bg-white/5 rounded-[2rem] border border-white/5">
                    <img [src]="userAvatar()" class="w-10 h-10 rounded-xl border border-white/10" alt="Avatar">
                    <div class="flex-1 min-w-0">
                        <p class="text-xs font-black text-white truncate">{{userName()}}</p>
                        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Docente</p>
                    </div>
                    <button (click)="logout()" class="text-slate-500 hover:text-red-400 transition-colors">
                        <i class="fas fa-power-off"></i>
                    </button>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
        
        <!-- Navbar Móvil -->
        <header class="lg:hidden h-16 bg-slate-950/50 backdrop-blur-md border-b border-white/5 flex items-center px-6">
            <button (click)="toggleSidebar()" class="p-2 text-slate-400">
                <i class="fas fa-bars"></i>
            </button>
            <div class="ml-4 font-black text-white tracking-tight">LUMINA.DOCENTE</div>
        </header>

        <!-- Router Outlet (Contenido Dinámico) -->
        <main class="flex-1 overflow-y-auto custom-scrollbar relative">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>

<style>
    .active-link {
        background: rgba(255, 255, 255, 0.05);
        color: white !important;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .active-link .active-indicator {
        opacity: 1;
    }
    .active-link i {
        color: #06b6d4; /* cyan-500 */
    }
    
    .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.1);
    }
</style>
