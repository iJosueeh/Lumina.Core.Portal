<div class="min-h-screen bg-gradient-to-br from-[#0a1628] via-[#0f1e33] to-[#1a2942] relative overflow-hidden">
  <!-- Floating Light Effects -->
  <div class="absolute top-0 left-0 w-96 h-96 bg-gradient-radial from-teal-500/10 to-transparent rounded-full blur-3xl animate-pulse"></div>

  <!-- Header -->
  <header class="relative bg-gradient-to-r from-teal-600 via-cyan-500 to-teal-600 px-4 py-6 md:px-6 md:py-8 lg:px-8 lg:py-10 overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent animate-shimmer"></div>
    <div class="relative z-10">
      <h1 class="text-2xl md:text-3xl font-bold text-white drop-shadow-lg tracking-tight">Gestión de Asistencia</h1>
      <p class="text-white/90 mt-2 drop-shadow text-sm md:text-base">Controla la puntualidad y participación de tus estudiantes</p>
    </div>
  </header>

  <!-- Main Content -->
  <main class="p-4 md:p-6 lg:p-8 max-w-7xl mx-auto">
    
    <!-- Filtros y Estadísticas -->
    <app-attendance-header
      [courses]="courses()"
      [(selectedCourseId)]="selectedCourseId"
      [(searchTerm)]="searchTerm"
      [promedioAsistencia]="promedioAsistencia()"
      [totalPresentes]="totalPresentes()"
      [totalAusentes]="totalAusentes()"
      [totalTardanzas]="totalTardanzas()"
      (onExport)="exportToCSV()"
    />

    <!-- Loading State -->
    @if (isLoading()) {
      <div class="space-y-4">
        <app-skeleton-loader variant="rect" height="100px" />
        <app-skeleton-loader variant="rect" height="400px" />
      </div>
    } @else {
      <!-- Tabla de Asistencia -->
      <app-attendance-table
        [resumen]="filteredResumen()"
      />
    }

  </main>
</div>
