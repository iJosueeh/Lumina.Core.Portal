<div class="flex flex-col md:flex-row items-center justify-between gap-6">
    <!-- Selectores y Búsqueda -->
    <div class="flex flex-col md:flex-row items-end gap-5 w-full md:w-auto">

        <!-- Selector de Curso -->
        <div class="w-full md:w-72">
            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Asignatura</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                    <i class="fas fa-book-open text-slate-400"></i>
                </div>
                <select
                    [ngModel]="selectedCourseId"
                    (ngModelChange)="courseChange.emit($event)"
                    class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 pl-11 pr-10 text-slate-900 appearance-none focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-sm">
                    @for (course of courses; track course.id) {
                        <option [value]="course.id">{{ course.titulo }} ({{ course.codigo }})</option>
                    }
                </select>
                <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none">
                    <i class="fas fa-chevron-down text-[10px] text-slate-400"></i>
                </div>
            </div>
        </div>

        <!-- Buscador -->
        <div class="w-full md:w-64">
            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Filtrar Estudiante</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                    <i class="fas fa-search text-slate-400"></i>
                </div>
                <input
                    type="text"
                    [ngModel]="searchTerm"
                    (ngModelChange)="searchChange.emit($event)"
                    placeholder="Nombre o código..."
                    class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 pl-11 pr-4 text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-sm">
            </div>
        </div>
    </div>

    <!-- Acciones Rápidas -->
    <div class="flex items-center gap-3 w-full md:w-auto self-end">
        <button (click)="export.emit()"
            class="px-5 py-3 bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 font-semibold rounded-xl transition-all flex items-center gap-2 shadow-sm text-sm">
            <i class="fas fa-file-export text-indigo-500"></i>
            Exportar
        </button>

        <button (click)="createEvaluation.emit()"
            class="px-5 py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-xl transition-all flex items-center gap-2 shadow-sm text-sm">
            <i class="fas fa-plus-circle"></i>
            Nueva Eval
        </button>
    </div>
</div>
