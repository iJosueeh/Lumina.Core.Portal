<div class="flex flex-col md:flex-row items-center justify-between gap-8">
    <!-- Selectores y Búsqueda -->
    <div class="flex flex-col md:flex-row items-end gap-6 w-full md:w-auto">
        
        <!-- Selector de Curso -->
        <div class="w-full md:w-80 group">
            <label class="block text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3 ml-1">Asignatura</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                    <i class="fas fa-book-open text-slate-500 group-focus-within:text-cyan-400 transition-colors"></i>
                </div>
                <select 
                    [ngModel]="selectedCourseId" 
                    (ngModelChange)="courseChange.emit($event)"
                    class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white appearance-none focus:outline-none focus:ring-2 focus:ring-cyan-500/20 focus:border-cyan-500/40 transition-all font-medium">
                    @for (course of courses; track course.id) {
                        <option [value]="course.id" class="bg-slate-900 text-white">{{ course.titulo }} ({{ course.codigo }})</option>
                    }
                </select>
                <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none">
                    <i class="fas fa-chevron-down text-[10px] text-slate-500"></i>
                </div>
            </div>
        </div>

        <!-- Buscador -->
        <div class="w-full md:w-72 group">
            <label class="block text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3 ml-1">Filtrar Estudiante</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                    <i class="fas fa-search text-slate-500 group-focus-within:text-cyan-400 transition-colors"></i>
                </div>
                <input 
                    type="text" 
                    [ngModel]="searchTerm" 
                    (ngModelChange)="searchChange.emit($event)"
                    placeholder="Nombre o código..." 
                    class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-cyan-500/20 focus:border-cyan-500/40 transition-all font-medium">
            </div>
        </div>
    </div>

    <!-- Acciones Rápidas -->
    <div class="flex items-center gap-4 w-full md:w-auto self-end">
        <button (click)="export.emit()" 
            class="flex-1 md:flex-none px-6 py-4 bg-white/5 hover:bg-white/10 border border-white/10 text-white font-bold rounded-2xl transition-all flex items-center justify-center gap-3 group">
            <i class="fas fa-file-export text-cyan-400 group-hover:scale-110 transition-transform"></i>
            <span class="text-sm uppercase tracking-widest">Exportar</span>
        </button>
        
        <button (click)="createEvaluation.emit()" 
            class="flex-1 md:flex-none px-6 py-4 bg-purple-500/10 hover:bg-purple-500/20 border border-purple-500/20 text-purple-400 font-black rounded-2xl transition-all flex items-center justify-center gap-3">
            <i class="fas fa-plus-circle"></i>
            <span class="text-sm uppercase tracking-widest">Nueva Eval</span>
        </button>
    </div>
</div>
