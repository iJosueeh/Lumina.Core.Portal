<div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex flex-col md:flex-row items-center justify-between gap-6">
    <div class="flex flex-col md:flex-row items-center gap-4 w-full md:w-auto">
        <div class="w-full md:w-72">
            <app-select [ngModel]="selectedCourseId" (ngModelChange)="courseChange.emit($event)">
                @for (course of courses; track course.id) {
                    <option [value]="course.id">{{ course.titulo }} ({{ course.codigo }})</option>
                }
            </app-select>
        </div>
        <div class="w-full md:w-64">
            <app-input 
                [ngModel]="searchTerm" 
                (ngModelChange)="searchChange.emit($event)"
                placeholder="Buscar estudiante...">
            </app-input>
        </div>
    </div>

    <div class="flex items-center gap-3 w-full md:w-auto">
        <app-button variant="secondary" (onClick)="export.emit()">
            <i class="fas fa-file-excel mr-2"></i> Exportar
        </app-button>
        <app-button variant="ghost" (onClick)="createEvaluation.emit()">
            <i class="fas fa-plus mr-2"></i> Evaluación
        </app-button>
        <app-button [isLoading]="isSaving" (onClick)="save.emit()">
            <i class="fas fa-save mr-2"></i> Guardar Todo
        </app-button>
    </div>
</div>
