<div class="min-h-screen bg-[#020617] relative overflow-hidden text-slate-300 font-sans selection:bg-cyan-500/30">
  
  <!-- Efectos de Luces Ambientales -->
  <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-cyan-500/10 rounded-full blur-[120px] animate-pulse"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-500/10 rounded-full blur-[120px] animate-pulse" style="animation-delay: 2s"></div>

  <!-- Header Estilo Glassmorphism -->
  <header class="relative border-b border-white/5 bg-slate-950/20 backdrop-blur-xl z-20">
    <div class="max-w-7xl mx-auto px-6 py-8 md:py-12 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
      <div class="space-y-2">
        <div class="flex items-center gap-3">
          <span class="px-3 py-1 bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 rounded-full text-[10px] font-black uppercase tracking-[0.2em]">Gestión de Notas</span>
          <div class="w-2 h-2 rounded-full bg-cyan-500 animate-pulse"></div>
        </div>
        <h1 class="text-4xl md:text-5xl font-black text-white tracking-tighter">
          Calificaciones <span class="text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-500">y Evaluaciones</span>
        </h1>
        <p class="text-slate-500 font-medium max-w-lg">
          Registra y gestiona el rendimiento académico de tus estudiantes con precisión.
        </p>
      </div>

      <div class="flex gap-3">
        <button (click)="saveAll()" [disabled]="isSaving()" class="px-6 py-4 bg-cyan-500 hover:bg-cyan-400 disabled:opacity-50 disabled:scale-100 text-slate-950 font-black rounded-2xl transition-all transform hover:scale-105 active:scale-95 shadow-[0_0_20px_rgba(6,182,212,0.3)] text-sm uppercase tracking-widest flex items-center gap-2">
          @if (isSaving()) {
            <i class="fas fa-spinner fa-spin"></i>
            Guardando...
          } @else {
            <i class="fas fa-save"></i>
            Guardar Cambios
          }
        </button>
      </div>
    </div>
  </header>

  <!-- Contenido Principal -->
  <main class="relative z-10 max-w-7xl mx-auto px-6 py-12 space-y-10">
    
    <!-- Filtros -->
    <div class="bg-slate-900/40 backdrop-blur-sm border border-white/5 p-6 rounded-[2rem]">
      <app-grades-filter-bar
        [courses]="courses()"
        [selectedCourseId]="selectedCourseId()"
        [searchTerm]="searchTerm()"
        (courseChange)="selectedCourseId.set($event); loadGrades()"
        (searchChange)="searchTerm.set($event)"
      />
    </div>

    <!-- Resumen de Estadísticas -->
    <app-grades-stats-summary [stats]="stats()" />

    <!-- Tabla de Calificaciones -->
    <div class="bg-slate-900/40 backdrop-blur-sm border border-white/5 rounded-[2.5rem] overflow-hidden shadow-2xl">
      @if (isLoading()) {
        <div class="p-12 space-y-4">
          @for (i of [1,2,3,4,5]; track i) {
            <app-skeleton-loader class="h-16 w-full rounded-2xl opacity-10"></app-skeleton-loader>
          }
        </div>
      } @else {
        <app-grades-table
          [evaluaciones]="evaluaciones()"
          [calificaciones]="calificaciones()"
          (onEditEvaluation)="openEvaluationModal($event)"
          (onAddEvaluation)="openEvaluationModal()"
        />
      }
    </div>
  </main>

  <!-- Modal para Nueva Evaluación -->
  @if (showModal()) {
    <app-evaluation-modal
      [form]="evaluationForm"
      [isEdit]="isEditMode()"
      (onClose)="showModal.set(false)"
      (onSave)="saveEvaluation()"
    />
  }
</div>
