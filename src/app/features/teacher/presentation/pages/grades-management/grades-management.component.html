<div class="min-h-screen bg-gray-50 text-slate-900 font-sans">

  <!-- Header -->
  <app-page-header
    badge="Gestión de Notas"
    title="Calificaciones y Evaluaciones"
    subtitle="Registra y gestiona el rendimiento académico de tus estudiantes con precisión">
    <button (click)="saveAll()" [disabled]="isSaving()" class="px-5 py-3 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:scale-100 text-white font-semibold rounded-xl transition-all shadow-sm text-sm flex items-center gap-2">
      @if (isSaving()) {
        <i class="fas fa-spinner fa-spin"></i>
        Guardando...
      } @else {
        <i class="fas fa-save"></i>
        Guardar Cambios
      }
    </button>
  </app-page-header>

  <!-- Contenido Principal -->
  <main class="max-w-7xl mx-auto px-6 py-8 space-y-8">

    <!-- Filtros -->
    <div class="bg-white border border-slate-200 p-6 rounded-xl shadow-sm">
      <app-grades-filter-bar
        [courses]="courses()"
        [selectedCourseId]="selectedCourseId()"
        [searchTerm]="searchTerm()"
        (courseChange)="selectedCourseId.set($event); loadGrades()"
        (searchChange)="searchTerm.set($event)"
      />
    </div>

    <!-- Resumen de Estadísticas -->
    <app-grades-stats-summary [stats]="stats()" />

    <!-- Tabla de Calificaciones -->
    <div class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
      @if (isLoading()) {
        <div class="p-8 space-y-4">
          @for (i of [1,2,3,4,5]; track i) {
            <div class="h-14 w-full rounded-xl bg-slate-100 animate-pulse"></div>
          }
        </div>
      } @else {
        <app-grades-table
          [evaluaciones]="evaluaciones()"
          [calificaciones]="calificaciones()"
          (onEditEvaluation)="openEvaluationModal($event)"
          (onAddEvaluation)="openEvaluationModal()"
        />
      }
    </div>
  </main>

  <!-- Modal para Nueva Evaluación -->
  @if (showModal()) {
    <app-evaluation-modal
      [form]="evaluationForm"
      [isEdit]="isEditMode()"
      (onClose)="showModal.set(false)"
      (onSave)="saveEvaluation()"
    />
  }
</div>
