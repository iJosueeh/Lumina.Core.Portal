<div class="p-6 lg:p-8 space-y-8 min-h-screen bg-slate-50/50">
    <!-- Header Section -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">Control de Calificaciones</h1>
            <p class="text-slate-500 font-medium">Gestiona y analiza el rendimiento académico de tus estudiantes.</p>
        </div>
    </div>

    <!-- Filter & Actions Bar -->
    <app-grades-filter-bar
        [courses]="courses()"
        [selectedCourseId]="selectedCourseId()"
        [searchTerm]="searchTerm()"
        [isSaving]="isSaving()"
        (courseChange)="selectedCourseId.set($event); loadGrades()"
        (searchChange)="searchTerm.set($event)"
        (save)="saveAll()"
        (export)="notificationService.show('info', 'Exportando datos...')"
        (createEvaluation)="openEvaluationModal()">
    </app-grades-filter-bar>

    <!-- Stats Summary -->
    <app-grades-stats-summary [stats]="stats()"></app-grades-stats-summary>

    <!-- Main Grades Table -->
    <app-grades-table
        [evaluaciones]="evaluaciones()"
        [calificaciones]="calificaciones()"
        [isLoading]="isLoading()"
        (editEvaluation)="openEvaluationModal($event)">
    </app-grades-table>

    <!-- Evaluation Modal -->
    @if (showModal()) {
        <app-evaluation-modal
            [form]="evaluationForm"
            [isEdit]="isEditMode()"
            [isSaving]="false"
            (close)="showModal.set(false)"
            (save)="saveEvaluation()">
        </app-evaluation-modal>
    }
</div>
