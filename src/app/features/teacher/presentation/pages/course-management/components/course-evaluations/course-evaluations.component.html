<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    @if (isLoading()) {
        @for (i of [1,2,3]; track i) {
            <div class="h-48 bg-white/5 rounded-[2.5rem] p-8">
                <app-skeleton-loader class="h-full w-full rounded-2xl opacity-10"></app-skeleton-loader>
            </div>
        }
    } @else {
        @for (ev of evaluaciones(); track ev.id) {
            <div class="group bg-slate-900/40 backdrop-blur-sm border border-white/5 p-6 rounded-[2rem] hover:border-purple-500/30 transition-all relative overflow-hidden flex flex-col h-full shadow-xl">
                
                <div class="relative z-10 flex flex-col h-full">
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center text-purple-400 group-hover:scale-110 transition-all border border-white/5">
                            <i class="fas fa-file-invoice text-xl"></i>
                        </div>
                        <span class="px-3 py-1 bg-white/5 text-[9px] font-black uppercase tracking-widest rounded-full border border-white/10">{{ ev.estado }}</span>
                    </div>

                    <div class="space-y-1 mb-6">
                        <h3 class="text-lg font-black text-white leading-tight group-hover:text-purple-400 transition-colors truncate">
                            {{ ev.titulo }}
                        </h3>
                        <p class="text-[9px] text-slate-500 font-black uppercase tracking-widest">{{ ev.tipoEvaluacion }}</p>
                    </div>

                    <!-- Meta Info -->
                    <div class="grid grid-cols-2 gap-4 mt-auto">
                        <div class="bg-white/5 p-3 rounded-xl border border-white/5">
                            <p class="text-[8px] font-black text-slate-600 uppercase tracking-widest mb-1">Puntaje</p>
                            <p class="text-sm font-black text-white">{{ ev.puntajeMaximo }} pts</p>
                        </div>
                        <div class="bg-white/5 p-3 rounded-xl border border-white/5 text-center">
                            <button (click)="onEdit.emit(ev)" class="w-full h-full text-slate-400 hover:text-white transition-colors">
                                <i class="fas fa-edit text-xs"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        } @empty {
            <div class="col-span-full py-20 text-center bg-white/5 rounded-[2.5rem] border border-dashed border-white/10">
                <p class="text-slate-500 font-bold uppercase tracking-widest text-xs">No hay evaluaciones registradas para este curso.</p>
            </div>
        }
    }
</div>
