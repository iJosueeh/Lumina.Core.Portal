<div class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm transition-opacity duration-300">
  <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden border border-slate-200 dark:border-slate-800 transform transition-all duration-300 scale-100">
    <!-- Header -->
    <div class="px-6 py-5 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between bg-slate-50/50 dark:bg-slate-900/50">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-teal-100 dark:bg-teal-900/30 flex items-center justify-center text-teal-600 dark:text-teal-400">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <h3 class="text-xl font-bold text-slate-900 dark:text-white">Matricular Estudiante</h3>
      </div>
      <button (click)="close.emit()" class="p-2 rounded-lg text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="p-6 space-y-6">
      <!-- Toggle Mode -->
      <div class="flex p-1 bg-slate-100 dark:bg-slate-800 rounded-xl">
        <button (click)="assignMode.set('student')"
          [class]="assignMode() === 'student' ? 'bg-white dark:bg-slate-700 shadow-sm text-teal-600 dark:text-teal-400' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700'"
          class="flex-1 py-2 text-sm font-bold rounded-lg transition-all">
          Estudiantes Existentes
        </button>
        <button (click)="assignMode.set('usuario')"
          [class]="assignMode() === 'usuario' ? 'bg-white dark:bg-slate-700 shadow-sm text-teal-600 dark:text-teal-400' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700'"
          class="flex-1 py-2 text-sm font-bold rounded-lg transition-all">
          Buscar por Usuario
        </button>
      </div>

      <!-- Content based on mode -->
      @if (assignMode() === 'student') {
        <div class="space-y-4 animate-in fade-in duration-300">
          @if (assignableStudents().length > 0) {
            <div>
              <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Selecciona un Estudiante</label>
              <select [(ngModel)]="selectedStudentId" 
                class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500 transition-all outline-none">
                @for (s of assignableStudents(); track s.id) {
                  <option [value]="s.id">{{ s.nombreCompleto }} ({{ s.email }})</option>
                }
              </select>
            </div>
          } @else {
            <div class="p-4 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-700 text-center">
              <p class="text-slate-500 dark:text-slate-400">Todos tus estudiantes ya están en este curso.</p>
            </div>
          }
        </div>
      } @else {
        <div class="space-y-4 animate-in fade-in duration-300">
          <div>
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Buscar Usuario</label>
            <div class="relative">
              <input type="text" [(ngModel)]="userSearchTerm" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-teal-500/20 outline-none" placeholder="Nombre o email...">
              <svg class="absolute left-3 top-3.5 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2"/></svg>
            </div>
          </div>

          <div class="max-h-48 overflow-y-auto space-y-2 pr-2 scrollbar-thin">
            @if (loadingAssignableUsers()) {
              <div class="py-4 text-center"><div class="animate-spin h-6 w-6 border-2 border-teal-500 border-t-transparent rounded-full mx-auto"></div></div>
            }
            @for (u of filteredAssignableUsers(); track u.id) {
              <button (click)="selectedUserId.set(u.id)"
                [class]="selectedUserId() === u.id ? 'border-teal-500 bg-teal-50 dark:bg-teal-900/20' : 'border-slate-100 dark:border-slate-800 hover:border-slate-200'"
                class="w-full text-left p-3 rounded-xl border-2 transition-all">
                <p class="font-bold text-slate-800 dark:text-slate-200 text-sm">{{ u.nombreCompleto }}</p>
                <p class="text-xs text-slate-500 dark:text-slate-400">{{ u.email }}</p>
              </button>
            }
          </div>
        </div>
      }
    </div>

    <!-- Footer -->
    <div class="px-6 py-5 border-t border-slate-100 dark:border-slate-800 flex items-center gap-3 bg-slate-50/50 dark:bg-slate-900/50">
      <button (click)="close.emit()" class="flex-1 px-6 py-3 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 font-semibold hover:bg-slate-50 transition-all">Cancelar</button>
      <button (click)="submitAssign()" [disabled]="isAssigning() || !canSubmit()"
        class="flex-1 px-6 py-3 rounded-xl bg-teal-600 hover:bg-teal-700 text-white font-semibold shadow-lg transition-all disabled:opacity-50 flex items-center justify-center gap-2">
        @if (isAssigning()) { <div class="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></div> }
        <span>{{ isAssigning() ? 'Asignando...' : 'Asignar Estudiante' }}</span>
      </button>
    </div>
  </div>
</div>
