<div class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm transition-opacity duration-300">
  <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-hidden border border-slate-200 dark:border-slate-800 flex flex-col transform transition-all duration-300 scale-100">
    <!-- Header -->
    <div class="px-6 py-5 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between bg-slate-50/50 dark:bg-slate-900/50">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-indigo-100 dark:bg-indigo-900/30 flex items-center justify-center text-indigo-600 dark:text-indigo-400">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
          </svg>
        </div>
        <div>
          <h3 class="text-xl font-bold text-slate-900 dark:text-white">Editor de Preguntas</h3>
          <p class="text-sm text-slate-500 dark:text-slate-400">Evaluación: {{ quizzTitle }}</p>
        </div>
      </div>
      <button (click)="close.emit()" class="p-2 rounded-lg text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Content -->
    <div class="flex-1 overflow-y-auto p-6 space-y-8">
      @if (isLoading()) {
        <div class="flex flex-col items-center justify-center py-20 gap-4">
          <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-500/20 border-t-indigo-500"></div>
          <p class="text-slate-500 dark:text-slate-400 font-medium">Cargando preguntas existentes...</p>
        </div>
      } @else {
        @for (q of questionsList; track $index; let qIdx = $index) {
          <div class="group relative p-6 rounded-2xl bg-slate-50 dark:bg-slate-800/40 border border-slate-200 dark:border-slate-700/50 hover:border-indigo-500/30 transition-all">
            <div class="flex items-start justify-between mb-6">
              <div class="flex items-center gap-3">
                <span class="flex items-center justify-center w-8 h-8 rounded-lg bg-indigo-600 text-white text-sm font-bold shadow-lg shadow-indigo-500/20">
                  {{ qIdx + 1 }}
                </span>
                <h4 class="font-bold text-slate-800 dark:text-slate-200">Pregunta de Opción Múltiple</h4>
              </div>
              <button (click)="removeQuestion(qIdx)" 
                class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-all opacity-0 group-hover:opacity-100">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m4-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2"/></svg>
              </button>
            </div>

            <div class="space-y-4">
              <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Enunciado</label>
                <textarea [(ngModel)]="q.texto" rows="2" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all outline-none"></textarea>
              </div>

              <div class="space-y-3">
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Opciones</label>
                @for (opt of q.opciones; track $index; let oIdx = $index) {
                  <div class="flex items-center gap-3">
                    <button (click)="setCorrectOpcion(qIdx, oIdx)"
                      [class]="opt.esCorrecta ? 'bg-green-500 text-white' : 'border-2 border-slate-300 dark:border-slate-600'"
                      class="flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center transition-all">
                      @if (opt.esCorrecta) { <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" /></svg> }
                    </button>
                    <input type="text" [(ngModel)]="opt.texto" class="flex-1 px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all outline-none text-sm">
                  </div>
                }
              </div>
            </div>
          </div>
        }

        <button (click)="addEmptyQuestion()" 
          class="w-full py-4 border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-2xl text-slate-500 dark:text-slate-400 font-semibold hover:border-indigo-500 transition-all flex items-center justify-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2" stroke-linecap="round"/></svg>
          Nueva Pregunta
        </button>
      }
    </div>

    <!-- Footer -->
    <div class="p-6 border-t border-slate-100 dark:border-slate-800 flex items-center justify-end gap-3 bg-slate-50/50 dark:bg-slate-900/50">
      <button (click)="close.emit()" class="px-6 py-2.5 text-slate-400 font-semibold hover:text-slate-600">Cerrar</button>
      <button (click)="submitQuestions()" [disabled]="isSaving() || questionsList.length === 0"
        class="px-8 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold shadow-lg transition-all disabled:opacity-50">
        {{ isSaving() ? 'Guardando...' : 'Guardar Cambios' }}
      </button>
    </div>
  </div>
</div>
