<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
  <app-stat-card
    label="Total Estudiantes"
    [value]="course().totalAlumnos.toString()"
    [description]="course().alumnosActivos + ' activos actualmente'"
    icon="users"
    color="blue"
  />
  <app-stat-card
    label="Promedio General"
    [value]="(course().promedioGeneral | number: '1.1-1') || '0.0'"
    description="Rendimiento del grupo"
    icon="chart-line"
    color="teal"
  />
  <app-stat-card
    label="Eval. Pendientes"
    [value]="course().stats.tareasPendientes.toString()"
    description="Por calificar"
    icon="clipboard-check"
    color="orange"
  />
  <app-stat-card
    label="Contenido"
    [value]="totalLecciones().toString()"
    description="Lecciones publicadas"
    icon="book-open"
    color="purple"
  />
</div>
