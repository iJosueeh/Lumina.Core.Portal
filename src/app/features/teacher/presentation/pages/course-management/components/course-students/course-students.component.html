<div class="bg-slate-900/40 backdrop-blur-sm border border-white/5 rounded-[3rem] overflow-hidden shadow-2xl">
    <div class="overflow-x-auto">
        <table class="w-full text-left border-separate border-spacing-0">
            <thead>
                <tr class="bg-white/5">
                    <th class="px-8 py-6 text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 border-b border-white/5">Alumno</th>
                    <th class="px-8 py-6 text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 border-b border-white/5 text-center">Código</th>
                    <th class="px-8 py-6 text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 border-b border-white/5 text-center">Estado</th>
                    <th class="px-8 py-6 text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 border-b border-white/5 text-center">Promedio</th>
                    <th class="px-8 py-6 text-[10px] font-black uppercase tracking-[0.2em] text-cyan-500 border-b border-white/5 text-center bg-cyan-500/5">Asistencia</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-white/5">
                @for (student of students(); track student.id) {
                    <tr class="hover:bg-white/5 transition-all group cursor-pointer" [routerLink]="['/teacher/student', student.id]">
                        <td class="px-8 py-5">
                            <div class="flex items-center gap-4">
                                <img [src]="student.avatar" class="w-10 h-10 rounded-xl border border-white/10 group-hover:border-cyan-500/50 transition-all" alt="Avatar">
                                <span class="text-sm font-black text-white group-hover:text-cyan-400 transition-colors">{{ student.nombre }} {{ student.apellidos }}</span>
                            </div>
                        </td>
                        <td class="px-8 py-5 text-center text-xs font-bold text-slate-500 uppercase tracking-widest">{{ student.codigo }}</td>
                        <td class="px-8 py-5 text-center">
                            <span class="px-3 py-1 bg-green-500/10 text-green-500 border border-green-500/20 rounded-full text-[9px] font-black uppercase tracking-widest">Activo</span>
                        </td>
                        <td class="px-8 py-5 text-center">
                            <div class="inline-flex items-center justify-center w-10 h-10 rounded-xl bg-white/5 border border-white/10">
                                <span class="text-sm font-black text-white">{{ student.promedio }}</span>
                            </div>
                        </td>
                        <td class="px-8 py-5 text-center">
                            <span class="text-sm font-black text-cyan-400">{{ student.asistencia }}%</span>
                        </td>
                    </tr>
                } @empty {
                    <tr>
                        <td colspan="5" class="px-8 py-20 text-center">
                            <p class="text-slate-500 font-bold">No hay alumnos matriculados en este curso.</p>
                        </td>
                    </tr>
                }
            </tbody>
        </table>
    </div>
</div>
