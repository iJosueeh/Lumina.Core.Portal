<div
  class="bg-slate-800/40 border border-slate-700/50 rounded-2xl p-6 hover:bg-slate-800/60 transition-all cursor-pointer group"
  (click)="onViewDetails.emit(evaluation().id)"
>
  <div class="flex flex-col md:flex-row md:items-start justify-between gap-4">
    <div class="flex-1">
      <div class="flex items-center gap-3 mb-3">
        <app-status-badge
          [status]="getStatus(evaluation().estado)"
          [label]="evaluation().estado"
        />
        <app-status-badge
          [status]="getTipoStatus(evaluation().tipoEvaluacion)"
          [label]="evaluation().tipoEvaluacion"
        />
      </div>

      <h3 class="text-xl font-bold text-white group-hover:text-teal-400 transition-colors mb-2">
        {{ evaluation().titulo }}
      </h3>
      
      <p class="text-sm text-slate-400 mb-4 line-clamp-2">{{ evaluation().descripcion }}</p>
      
      <div class="flex flex-wrap items-center gap-4 text-xs text-slate-500">
        <div class="flex items-center gap-1.5">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-teal-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.247 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
          </svg>
          {{ evaluation().cursoNombre }}
        </div>
        <div class="flex items-center gap-1.5">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-teal-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          {{ evaluation().puntajeMaximo }} puntos máx.
        </div>
      </div>
    </div>

    <div class="flex flex-col md:items-end justify-between gap-4 border-t md:border-t-0 border-slate-700/30 pt-4 md:pt-0">
      <div class="text-right">
        <p class="text-[10px] uppercase font-bold text-slate-500 tracking-widest mb-1">Periodo de Evaluación</p>
        <p class="text-sm text-slate-300">{{ formatDate(evaluation().fechaInicio) }}</p>
        <p class="text-xs text-slate-500 italic">al {{ formatDate(evaluation().fechaFin) }}</p>
      </div>

      <div class="flex items-center gap-2">
        <button
          (click)="onDelete.emit({ id: evaluation().id, event: $event })"
          class="p-2 text-slate-500 hover:text-red-400 hover:bg-red-400/10 rounded-xl transition-all"
          title="Eliminar evaluación"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
        </button>
        <button
          class="px-4 py-2 bg-teal-500/10 hover:bg-teal-500 text-teal-400 hover:text-slate-900 rounded-xl text-sm font-bold transition-all"
        >
          Ver Calificaciones
        </button>
      </div>
    </div>
  </div>
</div>
