<div class="group bg-white border border-slate-200 p-6 rounded-xl hover:border-indigo-300 hover:shadow-md transition-all relative overflow-hidden flex flex-col h-full">

  <div class="flex justify-between items-start mb-4">
    <div class="flex items-center gap-2">
      <div class="w-10 h-10 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-600">
        <i [class]="evaluation().tipoEvaluacion === 'Examen' ? 'fas fa-file-invoice' : 'fas fa-tasks'"></i>
      </div>
      <div>
        <span class="px-2 py-0.5 text-[9px] font-bold uppercase tracking-widest rounded-full border"
          [class]="evaluation().estado === 'Pendiente' ? 'bg-amber-50 text-amber-700 border-amber-200' : evaluation().estado === 'Publicada' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-slate-100 text-slate-500 border-slate-200'">
          {{ evaluation().estado }}
        </span>
        <span class="ml-1.5 px-2 py-0.5 text-[9px] font-bold uppercase tracking-widest rounded-full bg-indigo-50 text-indigo-600 border border-indigo-200">
          {{ evaluation().tipoEvaluacion }}
        </span>
      </div>
    </div>
  </div>

  <div class="space-y-1 mb-4">
    <h3 class="text-base font-bold text-slate-900 leading-tight group-hover:text-indigo-600 transition-colors truncate">
      {{ evaluation().titulo }}
    </h3>
    <p class="text-[10px] text-indigo-500 font-bold uppercase tracking-widest">{{ evaluation().cursoNombre }}</p>
    <p class="text-xs text-slate-500 line-clamp-2">{{ evaluation().descripcion || 'Sin descripción.' }}</p>
  </div>

  <div class="grid grid-cols-2 gap-3 mb-4 mt-auto">
    <div class="bg-slate-50 p-3 rounded-lg border border-slate-100">
      <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest mb-1">Fecha Límite</p>
      <p class="text-[10px] font-semibold text-slate-600">{{ formatDate(evaluation().fechaFin) }}</p>
    </div>
    <div class="bg-slate-50 p-3 rounded-lg border border-slate-100">
      <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest mb-1">Puntaje</p>
      <p class="text-[10px] font-bold text-slate-900">{{ evaluation().puntajeMaximo }} pts</p>
    </div>
  </div>

  <div class="flex items-center gap-2 border-t border-slate-100 pt-4">
    <button (click)="onEdit.emit(evaluation().id); $event.stopPropagation()"
      class="flex-1 px-3 py-2 bg-indigo-50 hover:bg-indigo-500 text-indigo-600 hover:text-white text-[10px] font-bold uppercase tracking-widest rounded-lg transition-all text-center">
      Editar
    </button>
    <button (click)="onEditQuestions.emit(evaluation().id); $event.stopPropagation()"
      class="flex-1 px-3 py-2 bg-slate-50 hover:bg-indigo-500 text-slate-600 hover:text-white text-[10px] font-bold uppercase tracking-widest rounded-lg transition-all text-center border border-slate-200 hover:border-indigo-500">
      Preguntas
    </button>
    <button (click)="onDelete.emit({ id: evaluation().id, event: $event })"
      class="w-9 h-9 bg-slate-100 hover:bg-red-50 text-slate-400 hover:text-red-500 rounded-lg flex items-center justify-center transition-all flex-shrink-0">
      <i class="fas fa-trash-alt text-xs"></i>
    </button>
  </div>
</div>
