<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
  <!-- Búsqueda -->
  <div class="lg:col-span-2">
    <app-input
      label="Buscar Evaluación"
      placeholder="Título, descripción o curso..."
      [(ngModel)]="searchTerm"
      icon="search"
    />
  </div>

  <!-- Filtro por Curso -->
  <div>
    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Filtrar por Curso</label>
    <app-select [(ngModel)]="selectedCourseId">
      <option value="all">Todos los cursos</option>
      @for (course of courses(); track course.id) {
        <option [value]="course.id">{{ course.titulo }}</option>
      }
    </app-select>
  </div>
</div>
