<div class="min-h-screen bg-gray-50 text-slate-900 p-6 md:p-8">

    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10">
        <div>
            <div class="flex items-center gap-3 mb-2">
                <div class="w-10 h-10 rounded-xl bg-indigo-100 flex items-center justify-center text-indigo-600">
                    <i class="fas fa-users"></i>
                </div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Gestión de Usuarios</h1>
            </div>
            <p class="text-slate-500 text-sm ml-[52px]">Directorio central de estudiantes, docentes y personal administrativo.</p>
        </div>
        <button (click)="openAddUserModal()"
            class="flex items-center justify-center gap-3 px-6 py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-semibold shadow-sm transition-all active:scale-[0.98]">
            <i class="fas fa-plus"></i> Registrar Usuario
        </button>
    </div>

    <!-- Filters -->
    <div class="grid grid-cols-1 lg:grid-cols-4 gap-4 mb-8">
        <div class="lg:col-span-2 relative">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
            <input type="text" [ngModel]="searchTerm()" (ngModelChange)="searchTerm.set($event)"
                placeholder="Buscar por nombre, email o ID..."
                class="w-full bg-white border border-slate-200 rounded-xl pl-11 pr-4 py-3 text-sm text-slate-800 focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400">
        </div>
        <select [ngModel]="selectedRole()" (ngModelChange)="selectedRole.set($event)"
            class="bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-700 focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500 outline-none transition-all appearance-none">
            @for (r of ['Rol: Todos', 'Estudiante', 'Docente', 'Admin']; track r) {
                <option [value]="r">{{ r }}</option>
            }
        </select>
        <select [ngModel]="selectedStatus()" (ngModelChange)="selectedStatus.set($event)"
            class="bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-700 focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500 outline-none transition-all appearance-none">
            @for (s of ['Estado: Todos', 'Activo', 'Suspendido']; track s) {
                <option [value]="s">{{ s }}</option>
            }
        </select>
    </div>

    <!-- Content Table -->
    <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
        @if (isLoading()) {
            <div class="py-40 flex flex-col items-center gap-4">
                <div class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-100 border-t-indigo-600"></div>
                <p class="text-slate-400 font-semibold tracking-widest uppercase text-xs">Cargando directorio...</p>
            </div>
        } @else {
            <app-admin-user-table
                [users]="paginatedUsers()"
                (edit)="openEditUserModal($event)"
                (delete)="deleteUser($event)">
            </app-admin-user-table>
        }
    </div>

    <!-- Pagination -->
    @if (!isLoading() && totalPages() > 1) {
        <div class="mt-6 flex items-center justify-between px-2">
            <p class="text-slate-500 text-sm font-medium">Página {{ currentPage() }} de {{ totalPages() }}</p>
            <div class="flex gap-2">
                <button (click)="currentPage.set(currentPage() - 1)" [disabled]="currentPage() === 1"
                    class="px-4 py-2 rounded-xl bg-white border border-slate-200 text-slate-600 text-sm font-medium hover:bg-slate-50 disabled:opacity-30 transition-all">Anterior</button>
                <button (click)="currentPage.set(currentPage() + 1)" [disabled]="currentPage() === totalPages()"
                    class="px-4 py-2 rounded-xl bg-white border border-slate-200 text-slate-600 text-sm font-medium hover:bg-slate-50 disabled:opacity-30 transition-all">Siguiente</button>
            </div>
        </div>
    }

    <!-- Modal -->
    @if (isModalOpen()) {
        <app-admin-user-form-modal
            [user]="currentUser"
            [isEditing]="isEditing()"
            [isSaving]="isSaving()"
            [saveError]="saveError()"
            (close)="isModalOpen.set(false)"
            (save)="saveUser($event)">
        </app-admin-user-form-modal>
    }
</div>
