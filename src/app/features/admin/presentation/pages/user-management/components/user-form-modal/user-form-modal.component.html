<app-modal-container
    [title]="isEditing ? 'Editar Usuario' : 'Registrar Nuevo Usuario'"
    (close)="close.emit()"
    [showFooter]="true">

    <div class="space-y-5">
        @if (saveError) {
            <div class="p-3 bg-red-50 border border-red-200 rounded-xl flex items-center gap-2 text-red-600 text-sm">
                <i class="fas fa-exclamation-circle"></i>
                {{ saveError }}
            </div>
        }

        <!-- Email -->
        <div>
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5">
                Correo Institucional <span class="text-red-500">*</span>
            </label>
            <div class="relative">
                <input type="email" [value]="user.email" (input)="onEmailChange($any($event.target).value)"
                    [readonly]="isEditing"
                    placeholder="usuario@lumina.edu"
                    class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-900 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400 disabled:opacity-50">
                @if (isCheckingEmail) {
                    <div class="absolute right-3 top-1/2 -translate-y-1/2">
                        <div class="animate-spin h-4 w-4 border-2 border-indigo-600 border-t-transparent rounded-full"></div>
                    </div>
                } @else if (emailAvailability === 'available' && !isEditing) {
                    <div class="absolute right-3 top-1/2 -translate-y-1/2 text-green-500">
                        <i class="fas fa-check text-sm"></i>
                    </div>
                }
            </div>
            @if (emailCheckMessage) {
                <p class="text-xs mt-1 ml-1"
                   [class.text-red-500]="emailAvailability === 'taken'"
                   [class.text-green-500]="emailAvailability === 'available'">
                    {{ emailCheckMessage }}
                </p>
            }
        </div>

        <!-- Contraseña (solo crear, o si se quiere cambiar en editar) -->
        <div>
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5">
                Contraseña <span class="text-red-500">*</span>
            </label>
            <div class="relative">
                <input [type]="showPassword() ? 'text' : 'password'"
                    [value]="user.password || ''"
                    (input)="user.password = $any($event.target).value"
                    [placeholder]="isEditing ? 'Dejar vacío para no cambiar' : 'Mínimo 6 caracteres'"
                    class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 pr-10 py-3 text-sm text-slate-900 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400">
                <button type="button" (click)="showPassword.set(!showPassword())"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors">
                    <i [class]="showPassword() ? 'fas fa-eye-slash text-sm' : 'fas fa-eye text-sm'"></i>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <!-- Nombres -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5">
                    Nombres <span class="text-red-500">*</span>
                </label>
                <input type="text" [(ngModel)]="user.nombresPersona"
                    placeholder="Nombres"
                    class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-900 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400">
            </div>

            <!-- Apellido Paterno -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5">
                    Apellido Paterno <span class="text-red-500">*</span>
                </label>
                <input type="text" [(ngModel)]="user.apellidoPaterno"
                    placeholder="Apellido paterno"
                    class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-900 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400">
            </div>

            <!-- Apellido Materno -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5">
                    Apellido Materno
                </label>
                <input type="text" [(ngModel)]="user.apellidoMaterno"
                    placeholder="Apellido materno"
                    class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-900 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400">
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Rol -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5">
                    Rol del Sistema <span class="text-red-500">*</span>
                </label>
                <select [(ngModel)]="user.role"
                    class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-900 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all appearance-none cursor-pointer">
                    <option value="STUDENT">Estudiante</option>
                    <option value="TEACHER">Docente</option>
                    <option value="ADMIN">Administrador</option>
                </select>
            </div>

            <!-- Estado -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5">
                    Estado
                </label>
                <select [(ngModel)]="user.status"
                    class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-900 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all appearance-none cursor-pointer">
                    <option value="ACTIVE">Activo</option>
                    <option value="SUSPENDED">Suspendido</option>
                </select>
            </div>
        </div>
    </div>

    <div footer class="flex items-center gap-3">
        <button (click)="close.emit()"
            class="px-4 py-2.5 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-100 transition-all">
            Cancelar
        </button>
        <button (click)="submit()"
            [disabled]="isSaving || (emailAvailability === 'taken' && !isEditing) || !isFormValid()"
            class="px-5 py-2.5 rounded-xl text-sm font-semibold bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 disabled:cursor-not-allowed text-white shadow-sm transition-all flex items-center gap-2">
            @if (isSaving) {
                <div class="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></div>
            } @else {
                <i class="fas" [class.fa-plus]="!isEditing" [class.fa-check]="isEditing"></i>
            }
            {{ isEditing ? 'Actualizar' : 'Registrar' }}
        </button>
    </div>
</app-modal-container>
