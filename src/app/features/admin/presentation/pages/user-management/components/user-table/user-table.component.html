<div class="overflow-x-auto">
    <table class="w-full text-left border-collapse">
        <thead>
            <tr class="border-b border-slate-700/50">
                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-400">Usuario</th>
                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-400">Rol / Departamento</th>
                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-400">Estado</th>
                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-400 text-right">Acciones</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-slate-700/30">
            @for (user of users; track user.id) {
                <tr class="hover:bg-slate-700/20 transition-colors group">
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-teal-500/20 flex items-center justify-center text-teal-400 font-bold">
                                {{ user.fullName[0] }}
                            </div>
                            <div>
                                <p class="font-bold text-slate-100 group-hover:text-teal-400 transition-colors">{{ user.fullName }}</p>
                                <p class="text-xs text-slate-500 font-mono">{{ user.email }}</p>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <p class="text-sm text-slate-300 font-medium">{{ user.role }}</p>
                        <p class="text-xs text-slate-500">{{ user.department || 'Sin departamento' }}</p>
                    </td>
                    <td class="px-6 py-4">
                        <app-status-badge [status]="user.status"></app-status-badge>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <div class="flex items-center justify-end gap-2">
                            <button (click)="edit.emit(user)" class="p-2 text-slate-400 hover:text-teal-400 hover:bg-teal-400/10 rounded-lg transition-all">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            </button>
                            <button (click)="delete.emit(user)" class="p-2 text-slate-400 hover:text-red-400 hover:bg-red-400/10 rounded-lg transition-all">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m4-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            </button>
                        </div>
                    </td>
                </tr>
            } @empty {
                <tr>
                    <td colspan="4" class="px-6 py-20 text-center">
                        <div class="flex flex-col items-center gap-3 opacity-40">
                            <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            <p class="text-xl font-bold tracking-tight">No se encontraron usuarios</p>
                        </div>
                    </td>
                </tr>
            }
        </tbody>
    </table>
</div>
