<div class="overflow-x-auto">
    <table class="w-full text-left border-collapse">
        <thead>
            <tr class="border-b border-slate-200">
                <th class="px-6 py-4 text-[10px] font-bold uppercase tracking-widest text-slate-400">Usuario</th>
                <th class="px-6 py-4 text-[10px] font-bold uppercase tracking-widest text-slate-400">Rol / Departamento</th>
                <th class="px-6 py-4 text-[10px] font-bold uppercase tracking-widest text-slate-400">Estado</th>
                <th class="px-6 py-4 text-[10px] font-bold uppercase tracking-widest text-slate-400 text-right">Acciones</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-slate-100">
            @for (user of users; track user.id) {
                <tr class="hover:bg-slate-50 transition-colors group">
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-sm">
                                {{ user.fullName[0] }}
                            </div>
                            <div>
                                <p class="font-bold text-slate-900 group-hover:text-indigo-600 transition-colors text-sm">{{ user.fullName }}</p>
                                <p class="text-xs text-slate-400 font-mono">{{ user.email }}</p>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <p class="text-sm text-slate-700 font-medium">{{ user.role }}</p>
                        <p class="text-xs text-slate-400">{{ user.department || 'Sin departamento' }}</p>
                    </td>
                    <td class="px-6 py-4">
                        <app-status-badge [status]="user.status"></app-status-badge>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <div class="flex items-center justify-end gap-1">
                            <button (click)="edit.emit(user)" class="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all">
                                <i class="fas fa-pen text-sm"></i>
                            </button>
                            <button (click)="delete.emit(user)" class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all">
                                <i class="fas fa-trash text-sm"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            } @empty {
                <tr>
                    <td colspan="4" class="px-6 py-20 text-center">
                        <div class="flex flex-col items-center gap-3 text-slate-300">
                            <i class="fas fa-users text-4xl"></i>
                            <p class="text-sm font-bold text-slate-400">No se encontraron usuarios</p>
                        </div>
                    </td>
                </tr>
            }
        </tbody>
    </table>
</div>
