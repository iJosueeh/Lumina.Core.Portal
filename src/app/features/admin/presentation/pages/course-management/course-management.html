<div class="p-6 lg:p-8 space-y-6">
    <!-- Header Section -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">Gestión de Cursos</h1>
            <p class="text-slate-500 font-medium">Administra el catálogo de cursos, docentes y módulos institucionales.</p>
        </div>
        <app-button (onClick)="openCreateModal()">
            <i class="fas fa-plus mr-2"></i> Crear Nuevo Curso
        </app-button>
    </div>

    <!-- Filters Bar -->
    <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex flex-col md:flex-row items-center justify-between gap-4">
        <div class="flex flex-col md:flex-row items-center gap-4 w-full md:w-auto">
            <div class="w-full md:w-80">
                <app-input 
                    [ngModel]="searchTerm()" 
                    (ngModelChange)="searchTerm.set($event)"
                    placeholder="Buscar por nombre, código o docente...">
                </app-input>
            </div>
            <div class="w-full md:w-56">
                <app-select [ngModel]="selectedStatus()" (ngModelChange)="selectedStatus.set($event)">
                    <option>Estado: Todos</option>
                    <option>Publicado</option>
                    <option>Borrador</option>
                    <option>Archivado</option>
                </app-select>
            </div>
        </div>
        
        <div class="text-sm font-medium text-slate-400">
            Mostrando {{paginatedCourses().length}} de {{filteredCourses().length}} cursos
        </div>
    </div>

    <!-- Table Section -->
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
        <app-admin-course-table
            [courses]="paginatedCourses()"
            [isLoading]="isLoading()"
            (edit)="openEditModal($event)"
            (delete)="deleteCourse($event)">
        </app-admin-course-table>

        <!-- Pagination -->
        <app-pagination
            [currentPage]="currentPage()"
            [totalPages]="totalPages()"
            (pageChange)="currentPage.set($event)">
        </app-pagination>
    </div>

    <!-- Form Modal -->
    @if (isModalOpen()) {
        <app-admin-course-form-modal
            [course]="currentCourse"
            [docentes]="docentes()"
            [isEditing]="isEditing()"
            (close)="isModalOpen.set(false)"
            (save)="saveCourse($event)">
        </app-admin-course-form-modal>
    }
</div>
