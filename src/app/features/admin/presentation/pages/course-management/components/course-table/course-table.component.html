<div class="overflow-x-auto">
  <table class="course-table">
    <thead>
      <tr>
        <th class="text-left">Información del Curso</th>
        <th class="text-center">Código</th>
        <th class="text-left">Instructor</th>
        <th class="text-center">Estado</th>
        <th class="text-right">Operaciones</th>
      </tr>
    </thead>
    <tbody>
      @for (course of courses(); track course.id) {
        <tr class="group">
          <!-- Nombre e Imagen -->
          <td>
            <div class="flex items-center gap-4">
              <div class="w-12 h-12 rounded-xl overflow-hidden border border-slate-200 bg-slate-100 shrink-0">
                <img [src]="course.coverImage" class="w-full h-full object-cover" alt="Cover" (error)="$any($event.target).src = 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=100'">
              </div>
              <div class="min-w-0">
                <span class="block font-black text-slate-900 truncate text-sm tracking-tight group-hover:text-indigo-600 transition-colors">{{ course.name }}</span>
                <span class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">{{ course.modules }} Módulos</span>
              </div>
            </div>
          </td>

          <!-- Código -->
          <td class="text-center">
            <span class="px-2.5 py-1 rounded-md bg-slate-100 border border-slate-200 text-[10px] font-mono text-indigo-600 uppercase tracking-tighter">
              {{ course.code }}
            </span>
          </td>

          <!-- Instructor -->
          <td class="text-slate-600 font-semibold text-xs">
            <div class="flex items-center gap-2">
              <div class="w-6 h-6 rounded-full bg-slate-100 flex items-center justify-center text-[10px] text-slate-400 border border-slate-200">
                <i class="fas fa-user-tie"></i>
              </div>
              {{ course.teacherName }}
            </div>
          </td>

          <!-- Estado -->
          <td class="text-center">
            <app-status-badge 
              [status]="course.status" 
              [label]="course.status === 'PUBLISHED' ? 'Público' : 'Borrador'"
            ></app-status-badge>
          </td>

          <!-- Acciones -->
          <td>
            <div class="flex items-center justify-end gap-2">
              <button 
                class="w-10 h-10 rounded-xl bg-slate-50 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 transition-all flex items-center justify-center border border-slate-200"
                (click)="manageCourse(course.id!)"
                title="Gestionar Curso (Vista Docente)"
              >
                <i class="fas fa-desktop text-sm"></i>
              </button>

              <button 
                class="w-10 h-10 rounded-xl bg-slate-50 text-slate-400 hover:text-purple-600 hover:bg-purple-50 transition-all flex items-center justify-center border border-slate-200"
                (click)="editContent(course.id!)"
                title="Editor Multimedia"
              >
                <i class="fas fa-clapperboard text-sm"></i>
              </button>
              
              <button 
                class="w-10 h-10 rounded-xl bg-slate-50 text-slate-400 hover:text-blue-600 hover:bg-blue-50 transition-all flex items-center justify-center border border-slate-200"
                (click)="onEdit.emit(course)"
                title="Ajustes Rápidos"
              >
                <i class="fas fa-cog text-sm"></i>
              </button>

              <button 
                class="w-10 h-10 rounded-xl bg-slate-50 text-slate-400 hover:text-red-600 hover:bg-red-50 transition-all flex items-center justify-center border border-slate-200"
                (click)="onDelete.emit(course)"
                title="Eliminar"
              >
                <i class="fas fa-trash-alt text-sm"></i>
              </button>
            </div>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
