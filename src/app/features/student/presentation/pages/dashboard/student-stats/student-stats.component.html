<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
    <app-stat-card 
        label="Promedio General" 
        [value]="stats.promedio" 
        icon="graduation-cap" 
        color="teal"
        trend="SOBRESALIENTE">
    </app-stat-card>
    <app-stat-card 
        label="Cursos en Curso" 
        [value]="stats.cursosActivos.toString()" 
        icon="book-open" 
        color="purple">
    </app-stat-card>
    <app-stat-card 
        label="Créditos Acumulados" 
        [value]="stats.creditosTotales.toString()" 
        icon="medal" 
        color="orange">
    </app-stat-card>
    <app-stat-card 
        label="Asistencia Promedio" 
        [value]="stats.asistencia" 
        icon="user-check" 
        color="green">
    </app-stat-card>
</div>
