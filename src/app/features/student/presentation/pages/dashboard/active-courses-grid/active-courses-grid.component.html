<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    @if (isLoading) {
        @for (i of [1,2,3,4]; track i) {
            <div class="h-56 bg-white rounded-xl border border-slate-200 p-6 shadow-sm animate-pulse">
                <div class="w-full h-full bg-slate-100 rounded-lg"></div>
            </div>
        }
    } @else {
        @for (course of courses; track course.id) {
            <div (click)="onCourseSelect.emit(course.id)" 
                class="group bg-white border border-slate-200 p-6 rounded-xl hover:border-indigo-300 hover:shadow-md transition-all cursor-pointer flex flex-col h-full shadow-sm">
                
                <div class="flex justify-between items-start mb-4">
                    <div class="w-12 h-12 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-600 group-hover:bg-indigo-100 transition-all">
                        <i class="fas fa-book-open text-lg"></i>
                    </div>
                    <span class="px-2.5 py-1 bg-emerald-50 text-emerald-700 text-[10px] font-bold uppercase tracking-widest rounded-full border border-emerald-200">Activo</span>
                </div>

                <div class="space-y-1 mb-4 flex-1">
                    <span class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest">{{ course.id.slice(0, 8) }}</span>
                    <h3 class="text-base font-semibold text-slate-900 leading-tight group-hover:text-indigo-600 transition-colors">
                        {{ course.titulo }}
                    </h3>
                </div>

                <!-- Progreso -->
                <div class="mt-auto space-y-2">
                    <div class="flex items-center justify-between text-[10px] font-bold uppercase tracking-widest">
                        <span class="text-slate-500">Progreso del curso</span>
                        <span class="text-slate-700">{{ course.progreso }}%</span>
                    </div>
                    <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full bg-indigo-500 rounded-full transition-all duration-1000" 
                            [style.width.%]="course.progreso"></div>
                    </div>
                </div>
            </div>
        } @empty {
            <div class="col-span-full py-16 text-center bg-white rounded-xl border border-dashed border-slate-300">
                <i class="fas fa-folder-open text-3xl text-slate-300 mb-3"></i>
                <h3 class="text-base font-medium text-slate-900">No estás matriculado en cursos activos</h3>
            </div>
        }
    }
</div>
