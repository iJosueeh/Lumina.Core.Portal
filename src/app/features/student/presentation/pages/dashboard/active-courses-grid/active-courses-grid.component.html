<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
    @if (isLoading) {
        @for (i of [1,2,3,4]; track i) {
            <div class="h-64 bg-white/5 rounded-[2.5rem] p-8">
                <div class="w-full h-full rounded-3xl animate-pulse bg-white/5 opacity-20"></div>
            </div>
        }
    } @else {
        @for (course of courses; track course.id) {
            <div (click)="onCourseSelect.emit(course.id)" 
                class="group bg-slate-900/40 backdrop-blur-sm border border-white/5 p-8 rounded-[2.5rem] hover:border-cyan-500/30 transition-all cursor-pointer relative overflow-hidden flex flex-col h-full shadow-2xl">
                
                <div class="absolute -top-24 -right-24 w-48 h-48 bg-cyan-500/5 rounded-full blur-[80px] group-hover:bg-cyan-500/10 transition-all"></div>

                <div class="relative z-10 flex flex-col h-full">
                    <div class="flex justify-between items-start mb-8">
                        <div class="w-14 h-14 bg-white/5 rounded-2xl flex items-center justify-center text-cyan-400 group-hover:scale-110 group-hover:bg-cyan-500/10 transition-all duration-500 border border-white/5">
                            <i class="fas fa-book-open text-xl"></i>
                        </div>
                        <span class="px-3 py-1 bg-white/5 text-[9px] font-black uppercase tracking-widest rounded-full border border-white/10">Activo</span>
                    </div>

                    <div class="space-y-2 mb-8">
                        <span class="text-[10px] font-black text-cyan-500 uppercase tracking-[0.2em]">{{ course.id.slice(0, 8) }}</span>
                        <h3 class="text-xl font-black text-white leading-tight group-hover:text-cyan-400 transition-colors">
                            {{ course.titulo }}
                        </h3>
                    </div>

                    <!-- Progreso -->
                    <div class="mt-auto space-y-4">
                        <div class="flex items-center justify-between text-[10px] font-black uppercase tracking-widest">
                            <span class="text-slate-500">Progreso del curso</span>
                            <span class="text-white">{{ course.progreso }}%</span>
                        </div>
                        <div class="w-full h-1.5 bg-white/5 rounded-full overflow-hidden">
                            <div class="h-full bg-gradient-to-r from-cyan-600 to-cyan-400 rounded-full transition-all duration-1000" 
                                [style.width.%]="course.progreso"></div>
                        </div>
                    </div>
                </div>
            </div>
        } @empty {
            <div class="col-span-full py-24 text-center bg-white/5 rounded-[3rem] border border-dashed border-white/10">
                <i class="fas fa-folder-open text-3xl text-slate-700 mb-4"></i>
                <h3 class="text-xl font-bold text-white">No estás matriculado en cursos activos</h3>
            </div>
        }
    }
</div>
