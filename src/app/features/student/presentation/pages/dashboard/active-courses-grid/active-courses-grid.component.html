<div class="space-y-6">
  <div class="flex items-center justify-between">
    <h2 class="text-xl font-bold text-white tracking-tight">Cursos en Curso</h2>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    @if (isLoading) {
      @for (i of [1,2,3]; track i) {
        <app-skeleton-loader height="320px" variant="rect" class="rounded-[2rem] overflow-hidden" />
      }
    } @else {
      @for (course of courses; track course.id) {
        <app-shared-course-card
          [data]="{
            id: course.id,
            titulo: course.titulo,
            codigo: 'PROG-101',
            coverImage: course.imagenUrl,
            modalidad: 'Virtual',
            progreso: course.progreso
          }"
          role="student"
          (onView)="viewCourse.emit($event)"
        />
      } @empty {
        <div class="col-span-full">
          <app-empty-state
            title="No estás matriculado en ningún curso"
            description="Explora el catálogo para comenzar tu aprendizaje."
            icon="course"
          />
        </div>
      }
    }
  </div>
</div>
