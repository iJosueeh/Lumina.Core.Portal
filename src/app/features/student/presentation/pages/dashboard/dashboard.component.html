<div class="min-h-screen bg-gray-50 text-slate-900 font-sans">

    <!-- Welcome Header Section -->
    <app-welcome-header
        [userName]="userName()"
        [isLoading]="isLoading()"
        (onRefresh)="handleRefresh()"
    />

    <!-- Contenido Principal -->
    <main class="max-w-7xl mx-auto px-6 pt-8 pb-10">
      
      <!-- Stats Quick View -->
      <div class="mb-8">
        <app-student-stats
          [coursesCount]="courses().length"
          [pendingAssignments]="pendingCount()"
          [isLoading]="isLoading()"
        />
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Columna Izquierda: Cursos Activos -->
        <section class="lg:col-span-2 space-y-6">
            <div class="flex items-center justify-between">
                <h2 class="text-xl font-bold text-slate-900 flex items-center gap-3">
                    <span class="w-8 h-8 bg-indigo-100 rounded-lg flex items-center justify-center">
                        <i class="fas fa-layer-group text-indigo-600 text-sm"></i>
                    </span>
                    Mis Cursos Actuales
                </h2>
                <a routerLink="/student/my-courses" class="text-sm font-semibold text-indigo-600 hover:text-indigo-500 transition-colors">Ver todos</a>
            </div>

            <app-active-courses-grid
                [courses]="courses()"
                [isLoading]="isLoading()"
                (onCourseSelect)="navigateToCourse($event)"
            />
        </section>

        <!-- Columna Derecha: Clases de Hoy + Tareas -->
        <section class="space-y-8">
            <!-- Clases de Hoy -->
            <div>
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-bold text-slate-900 flex items-center gap-3">
                        <span class="w-8 h-8 bg-indigo-100 rounded-lg flex items-center justify-center">
                            <i class="fas fa-calendar-day text-indigo-600 text-sm"></i>
                        </span>
                        Clases de Hoy
                    </h2>
                    <a routerLink="/student/schedule" class="text-sm font-semibold text-indigo-600 hover:text-indigo-500 transition-colors">Ver horario</a>
                </div>

                <app-today-classes
                    [courses]="todayCourses()"
                    [isLoading]="isLoading()"
                />
            </div>

            <!-- Tareas Próximas -->
            <div>
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-bold text-slate-900 flex items-center gap-3">
                        <span class="w-8 h-8 bg-purple-100 rounded-lg flex items-center justify-center">
                            <i class="fas fa-clock text-purple-600 text-sm"></i>
                        </span>
                        Próximas Entregas
                    </h2>
                </div>

                <app-upcoming-assignments
                    [assignments]="assignments()"
                    [isLoading]="isLoading()"
                />
            </div>

            <!-- Sección de Noticias Recientes -->
            <div class="mt-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-bold text-slate-900 flex items-center gap-3">
                        <span class="w-8 h-8 bg-amber-100 rounded-lg flex items-center justify-center">
                            <i class="fas fa-newspaper text-amber-600 text-sm"></i>
                        </span>
                        Noticias Recientes
                    </h2>
                    <a routerLink="/student/announcements" class="text-sm font-semibold text-indigo-600 hover:text-indigo-500 transition-colors">Ver todas</a>
                </div>

                <app-recent-announcements
                    [announcements]="announcements()"
                    [isLoading]="isLoading()"
                    [limit]="3"
                />
            </div>

            <!-- Card Informativa Adicional -->
            <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
                <div class="flex items-start gap-4">
                    <div class="w-10 h-10 bg-indigo-100 rounded-lg flex items-center justify-center flex-shrink-0">
                        <i class="fas fa-info-circle text-indigo-600"></i>
                    </div>
                    <div>
                        <h3 class="text-sm font-semibold text-slate-900 mb-1">¿Necesitas ayuda?</h3>
                        <p class="text-xs text-slate-500 leading-relaxed mb-3">
                            Consulta los tutoriales del campus o contacta con el soporte técnico.
                        </p>
                        <a href="#" class="text-xs font-semibold text-indigo-600 hover:text-indigo-500 transition-colors">
                            Ir al centro de ayuda →
                        </a>
                    </div>
                </div>
            </div>
        </section>
      </div>
    </main>
  </div>
