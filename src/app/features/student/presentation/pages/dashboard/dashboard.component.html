<div class="p-6 lg:p-8 space-y-8 min-h-screen bg-slate-50/50">
    <!-- Welcome Section -->
    <app-welcome-header
        [userName]="userName()"
        [pendingCount]="pendingCount()"
        (refresh)="handleRefresh()">
    </app-welcome-header>

    <!-- Quick Stats -->
    <app-student-stats></app-student-stats>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Active Courses (Main Column) -->
        <div class="lg:col-span-2">
            <app-active-courses-grid
                [courses]="courses()"
                [isLoading]="isLoading()"
                (viewCourse)="navigateToCourse($event)">
            </app-active-courses-grid>
        </div>

        <!-- Sidebar Widgets -->
        <div class="space-y-8">
            <!-- Upcoming Assignments -->
            <app-upcoming-assignments
                [assignments]="assignments()"
                [isLoading]="isLoading()"
                (viewAll)="router.navigate(['/student/evaluations'])">
            </app-upcoming-assignments>

            <!-- Announcements -->
            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-6">
                <h3 class="font-bold text-slate-800 italic">Anuncios Recientes</h3>
                <div class="space-y-4">
                    @for (item of announcements(); track item.id) {
                        <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 hover:border-teal-500/20 transition-all cursor-pointer">
                            <h4 class="text-sm font-bold text-slate-700 mb-1">{{ item.titulo }}</h4>
                            <p class="text-xs text-slate-400 line-clamp-2">{{ item.descripcion }}</p>
                        </div>
                    } @empty {
                        <p class="text-center text-slate-400 text-sm py-4">No hay avisos nuevos</p>
                    }
                </div>
            </div>
        </div>
    </div>
</div>
