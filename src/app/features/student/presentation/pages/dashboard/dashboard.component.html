<div class="p-6 lg:p-8 space-y-8 min-h-screen bg-[#020617] text-white">
    <!-- Seccion de Bienvenida -->
    <app-welcome-header
        [userName]="userName()"
        [pendingCount]="pendingCount()"
        (refresh)="handleRefresh()">
    </app-welcome-header>

    <!-- Estadisticas Rapidas -->
    <app-student-stats></app-student-stats>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Columna Principal: Cursos Activos -->
        <div class="lg:col-span-2">
            <app-active-courses-grid
                [courses]="courses()"
                [isLoading]="isLoading()"
                (viewCourse)="navigateToCourse($event)">
            </app-active-courses-grid>
        </div>

        <!-- Sidebar Widgets -->
        <div class="space-y-8">
            <!-- Tareas Proximas -->
            <app-upcoming-assignments
                [assignments]="assignments()"
                [isLoading]="isLoading()"
                (viewAll)="router.navigate(['/student/evaluations'])">
            </app-upcoming-assignments>

            <!-- Anuncios Recientes -->
            <div class="bg-slate-900/40 backdrop-blur-sm p-8 rounded-[2.5rem] border border-slate-800/80 shadow-2xl space-y-8">
                <div class="flex items-center justify-between">
                    <h3 class="font-black text-xl text-white tracking-tight uppercase tracking-widest text-xs">Anuncios Recientes</h3>
                    <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center">
                        <i class="fas fa-bullhorn text-[10px] text-cyan-400"></i>
                    </div>
                </div>
                
                <div class="space-y-4">
                    @for (item of announcements(); track item.id) {
                        <div class="group p-5 bg-slate-900/60 rounded-3xl border border-slate-800/60 hover:border-cyan-500/30 hover:bg-slate-800/80 transition-all cursor-pointer">
                            <h4 class="text-sm font-bold text-white mb-2 group-hover:text-cyan-400 transition-colors leading-snug">{{ item.titulo }}</h4>
                            <p class="text-xs text-slate-400 line-clamp-2 leading-relaxed">{{ item.descripcion }}</p>
                            <div class="mt-3 flex items-center gap-2">
                                <span class="w-1 h-1 rounded-full bg-cyan-500/40"></span>
                                <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Hace 2 horas</span>
                            </div>
                        </div>
                    } @empty {
                        <div class="py-10 text-center space-y-3">
                            <i class="fas fa-inbox text-2xl text-slate-700"></i>
                            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">No hay avisos nuevos</p>
                        </div>
                    }
                </div>
            </div>
        </div>
    </div>
</div>
