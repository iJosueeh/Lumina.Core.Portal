<header class="border-b border-slate-200 bg-white z-20">
    <div class="max-w-7xl mx-auto px-6 py-10 md:py-12 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
        <div class="space-y-2">
            <div class="flex items-center gap-3">
                <span class="px-3 py-1 bg-indigo-50 text-indigo-700 border border-indigo-200 rounded-full text-[10px] font-bold uppercase tracking-widest">Dashboard Estudiante</span>
            </div>
            
            @if (isLoading) {
                <div class="space-y-3">
                    <div class="h-10 w-64 bg-slate-100 rounded-lg animate-pulse"></div>
                    <div class="h-4 w-80 bg-slate-100 rounded animate-pulse"></div>
                </div>
            } @else {
                <h1 class="text-3xl md:text-4xl font-bold text-slate-900 tracking-tight">
                    Hola, {{ userName }}
                </h1>
                <p class="text-slate-500 font-medium max-w-lg">
                    Bienvenido a tu centro de aprendizaje. Tienes contenido nuevo esperándote hoy.
                </p>
            }
        </div>

        <div class="flex gap-3">
            <button (click)="onRefresh.emit()" class="p-3 bg-white hover:bg-slate-50 border border-slate-200 rounded-xl transition-all group shadow-sm">
                <i class="fas fa-sync-alt text-slate-600 group-hover:rotate-180 transition-transform duration-500"></i>
            </button>
            <button routerLink="/student/my-courses" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-xl transition-all shadow-sm text-sm">
                Continuar Aprendiendo
            </button>
        </div>
    </div>
</header>
