<header class="relative border-b border-white/5 bg-slate-950/20 backdrop-blur-xl z-20">
    <div class="max-w-7xl mx-auto px-6 py-10 md:py-16 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
        <div class="space-y-2">
            <div class="flex items-center gap-3">
                <span class="px-3 py-1 bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 rounded-full text-[10px] font-black uppercase tracking-[0.2em]">Dashboard Estudiante</span>
                <div class="w-2 h-2 rounded-full bg-cyan-500 animate-pulse"></div>
            </div>
            
            @if (isLoading) {
                <div class="space-y-3">
                    <div class="h-12 w-64 bg-white/5 rounded-2xl animate-pulse"></div>
                    <div class="h-4 w-96 bg-white/5 rounded-lg animate-pulse opacity-50"></div>
                </div>
            } @else {
                <h1 class="text-4xl md:text-6xl font-black text-white tracking-tighter">
                    Hola, <span class="text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-500">{{ userName }}</span> 👋
                </h1>
                <p class="text-slate-500 font-medium max-w-lg">
                    Bienvenido a tu centro de aprendizaje. Tienes contenido nuevo esperándote hoy.
                </p>
            }
        </div>

        <div class="flex gap-3">
            <button (click)="onRefresh.emit()" class="p-4 bg-white/5 hover:bg-white/10 border border-white/10 rounded-2xl transition-all group">
                <i class="fas fa-sync-alt text-white group-hover:rotate-180 transition-transform duration-500"></i>
            </button>
            <button routerLink="/student/my-courses" class="px-6 py-4 bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-black rounded-2xl transition-all transform hover:scale-105 active:scale-95 shadow-[0_0_20px_rgba(6,182,212,0.3)] text-sm uppercase tracking-widest">
                Continuar Aprendiendo
            </button>
        </div>
    </div>
</header>
