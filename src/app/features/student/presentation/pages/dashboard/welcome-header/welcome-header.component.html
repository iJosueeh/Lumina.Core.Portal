<div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
    <div class="space-y-1">
        <h1 class="text-3xl md:text-4xl font-black text-slate-800 tracking-tight">
            ¡Hola, {{ userName }}! 👋
        </h1>
        <p class="text-slate-500 font-medium text-lg">
            @if (pendingCount > 0) {
                Tienes <span class="text-teal-600 font-bold">{{ pendingCount }} tareas</span> pendientes por entregar.
            } @else {
                ¡Estás al día con tus actividades! Sigue así.
            }
        </p>
    </div>
    
    <div class="flex items-center gap-3">
        <app-button variant="secondary" (onClick)="refresh.emit()">
            <i class="fas fa-sync-alt mr-2"></i> Actualizar
        </app-button>
        <app-button [routerLink]="['/student/courses']">
            Mis Cursos <i class="fas fa-chevron-right ml-2 text-xs"></i>
        </app-button>
    </div>
</div>
