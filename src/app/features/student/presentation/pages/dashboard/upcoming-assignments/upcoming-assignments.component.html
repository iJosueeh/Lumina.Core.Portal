<div class="space-y-4">
    @if (isLoading) {
        @for (i of [1,2,3]; track i) {
            <div class="h-24 bg-white/5 rounded-3xl animate-pulse"></div>
        }
    } @else {
        @for (assignment of assignments; track assignment.id) {
            <div class="group bg-white/5 border border-white/5 p-5 rounded-3xl hover:bg-white/10 transition-all cursor-pointer relative overflow-hidden">
                <div class="flex gap-4 items-center">
                    <div class="w-12 h-12 bg-purple-500/10 rounded-2xl flex items-center justify-center text-purple-400 font-black">
                        <i class="fas fa-clipboard-list"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h4 class="text-sm font-black text-white truncate group-hover:text-purple-400 transition-colors">{{ assignment.titulo }}</h4>
                        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1 truncate">{{ assignment.cursoNombre }}</p>
                        <div class="flex items-center gap-2 mt-2">
                            <i class="fas fa-calendar-alt text-[9px] text-orange-500"></i>
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Vence: {{ assignment.fechaLimite | date:'dd MMM' }}</span>
                        </div>
                    </div>
                    <div class="opacity-0 group-hover:opacity-100 transition-opacity">
                        <i class="fas fa-chevron-right text-xs text-slate-600"></i>
                    </div>
                </div>
            </div>
        } @empty {
            <div class="p-8 text-center bg-white/5 rounded-[2rem] border border-dashed border-white/10">
                <p class="text-slate-600 text-xs font-black uppercase tracking-widest">Sin tareas pendientes</p>
            </div>
        }
    }
</div>
