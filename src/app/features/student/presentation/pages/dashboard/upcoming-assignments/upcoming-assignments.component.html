<div class="space-y-3">
    @if (isLoading) {
        @for (i of [1,2,3]; track i) {
            <div class="h-20 bg-white rounded-xl border border-slate-200 animate-pulse shadow-sm"></div>
        }
    } @else {
        @for (assignment of assignments; track assignment.id) {
            <div class="group bg-white border border-slate-200 p-4 rounded-xl hover:border-indigo-200 hover:shadow-sm transition-all cursor-pointer shadow-sm">
                <div class="flex gap-3 items-center">
                    <div class="w-10 h-10 bg-purple-50 rounded-xl flex items-center justify-center text-purple-600 flex-shrink-0">
                        <i class="fas fa-clipboard-list text-sm"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h4 class="text-sm font-semibold text-slate-900 truncate group-hover:text-indigo-600 transition-colors">{{ assignment.titulo }}</h4>
                        <p class="text-[10px] text-slate-500 font-medium uppercase tracking-widest mt-0.5 truncate">{{ assignment.cursoNombre }}</p>
                        <div class="flex items-center gap-1.5 mt-1.5">
                            <i class="fas fa-calendar-alt text-[9px] text-amber-500"></i>
                            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Vence: {{ assignment.fechaLimite | date:'dd MMM' }}</span>
                        </div>
                    </div>
                    <div class="opacity-0 group-hover:opacity-100 transition-opacity">
                        <i class="fas fa-chevron-right text-xs text-slate-400"></i>
                    </div>
                </div>
            </div>
        } @empty {
            <div class="p-6 text-center bg-white rounded-xl border border-dashed border-slate-300">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Sin tareas pendientes</p>
            </div>
        }
    }
</div>
