<div class="bg-slate-900/40 backdrop-blur-sm p-8 rounded-[2.5rem] border border-slate-800/80 shadow-2xl space-y-8">
    <div class="flex items-center justify-between">
        <h3 class="font-black text-xl text-white tracking-tight uppercase tracking-widest text-xs">Próximas Tareas</h3>
        <button (click)="viewAll.emit()" class="text-[10px] font-black text-cyan-500 hover:text-cyan-400 uppercase tracking-widest transition-colors">Ver todas</button>
    </div>

    <div class="space-y-6">
        @if (isLoading) {
            @for (i of [1,2,3]; track i) {
                <div class="flex gap-4 animate-pulse">
                    <div class="w-12 h-12 rounded-2xl bg-slate-800/50 flex-shrink-0"></div>
                    <div class="flex-1 space-y-3 pt-1">
                        <div class="h-4 bg-slate-800/50 rounded-lg w-3/4"></div>
                        <div class="h-3 bg-slate-800/30 rounded-lg w-1/2"></div>
                    </div>
                </div>
            }
        } @else {
            @for (task of assignments.slice(0, limit); track task.id) {
                <div class="flex gap-5 group cursor-pointer">
                    <div class="w-12 h-12 rounded-2xl bg-slate-800/60 border border-slate-800 flex items-center justify-center flex-shrink-0 text-slate-500 group-hover:bg-cyan-500/10 group-hover:text-cyan-400 group-hover:border-cyan-500/20 transition-all duration-300">
                        <i class="fas fa-tasks text-sm"></i>
                    </div>
                    <div class="min-w-0 flex-1 py-0.5">
                        <h4 class="text-sm font-bold text-white truncate mb-1 group-hover:text-cyan-400 transition-colors leading-snug">{{ task.titulo }}</h4>
                        <div class="flex items-center justify-between gap-4">
                            <span class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.15em] truncate">{{ task.cursoNombre }}</span>
                            <span [class]="task.esUrgente ? 'text-rose-500' : 'text-amber-500'" class="text-[9px] font-black uppercase tracking-widest flex-shrink-0 bg-slate-950/40 px-2 py-0.5 rounded-full border border-white/5">
                                {{ getTimeAgo(task.fechaLimite) }}
                            </span>
                        </div>
                    </div>
                </div>
            } @empty {
                <div class="py-10 text-center space-y-3 opacity-50">
                    <i class="fas fa-check-circle text-2xl text-slate-700"></i>
                    <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">No hay tareas pendientes</p>
                </div>
            }
        }
    </div>
</div>
