<div class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4" (click)="closeModal()">
  <div class="bg-white rounded-xl shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto" (click)="$event.stopPropagation()">

    <div class="sticky top-0 bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between z-10">
      <div>
        <h2 class="text-xl font-bold text-slate-900">Añadir Evento</h2>
        <p class="text-sm text-slate-500 mt-0.5">Crea un nuevo evento en tu horario</p>
      </div>
      <button (click)="closeModal()" class="w-9 h-9 rounded-lg hover:bg-slate-100 flex items-center justify-center transition-colors" aria-label="Cerrar">
        <i class="fas fa-times text-slate-400"></i>
      </button>
    </div>

    @if (error()) {
      <div class="mx-6 mt-4 bg-red-50 border border-red-200 rounded-lg p-4">
        <p class="text-red-700 text-sm">{{ error() }}</p>
      </div>
    }

    <form [formGroup]="eventForm" (ngSubmit)="saveEvent()" class="p-6 space-y-5">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Categoría <span class="text-red-500">*</span></label>
        <div class="grid grid-cols-3 gap-2">
          @for (category of categories | keyvalue; track category.key) {
            <button type="button" (click)="selectCategory($any(category.key))"
              [class.ring-2]="eventForm.get('category')?.value === category.key"
              [class.ring-indigo-500]="eventForm.get('category')?.value === category.key"
              [class]="category.value.bgColor"
              class="p-3 rounded-lg border-2 border-transparent hover:border-indigo-300 transition flex flex-col items-center gap-1.5">
              <i [class]="category.value.icon" class="text-lg text-slate-600"></i>
              <span class="text-xs font-semibold text-slate-700">{{ category.value.label }}</span>
            </button>
          }
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Título del Evento <span class="text-red-500">*</span></label>
        <input type="text" formControlName="title" placeholder="Ej: Programación Avanzada"
          [class.border-red-400]="isFieldInvalid('title')"
          class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm" />
        @if (isFieldInvalid('title')) {
          <p class="text-red-500 text-xs mt-1">{{ getErrorMessage('title') }}</p>
        }
      </div>

      <div class="grid grid-cols-3 gap-3">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Fecha <span class="text-red-500">*</span></label>
          <input type="date" formControlName="date"
            [class.border-red-400]="isFieldInvalid('date')"
            class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Hora Inicio <span class="text-red-500">*</span></label>
          <input type="time" formControlName="startTime"
            [class.border-red-400]="isFieldInvalid('startTime')"
            class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Hora Fin <span class="text-red-500">*</span></label>
          <input type="time" formControlName="endTime"
            [class.border-red-400]="isFieldInvalid('endTime')"
            class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm" />
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Modalidad <span class="text-red-500">*</span></label>
        <div class="flex gap-2">
          <button type="button" (click)="eventForm.patchValue({ locationType: 'presencial' })"
            [class.bg-indigo-600]="eventForm.get('locationType')?.value === 'presencial'"
            [class.text-white]="eventForm.get('locationType')?.value === 'presencial'"
            [class.border-indigo-600]="eventForm.get('locationType')?.value === 'presencial'"
            class="flex-1 px-4 py-2.5 border-2 border-slate-200 rounded-lg hover:border-indigo-400 transition flex items-center justify-center gap-2 text-sm font-medium">
            <i class="fas fa-map-marker-alt"></i> Presencial
          </button>
          <button type="button" (click)="eventForm.patchValue({ locationType: 'virtual' })"
            [class.bg-indigo-600]="eventForm.get('locationType')?.value === 'virtual'"
            [class.text-white]="eventForm.get('locationType')?.value === 'virtual'"
            [class.border-indigo-600]="eventForm.get('locationType')?.value === 'virtual'"
            class="flex-1 px-4 py-2.5 border-2 border-slate-200 rounded-lg hover:border-indigo-400 transition flex items-center justify-center gap-2 text-sm font-medium">
            <i class="fas fa-video"></i> Virtual
          </button>
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Ubicación <span class="text-red-500">*</span></label>
        <input type="text" formControlName="location"
          [placeholder]="eventForm.get('locationType')?.value === 'virtual' ? 'Ej: Google Meet, Zoom' : 'Ej: Aula 301, Lab 205'"
          [class.border-red-400]="isFieldInvalid('location')"
          class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm" />
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Descripción (Opcional)</label>
        <textarea formControlName="description" rows="2" placeholder="Notas o detalles adicionales..."
          class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm resize-none"></textarea>
      </div>

      <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-200">
        <button type="button" (click)="closeModal()" [disabled]="isSaving()"
          class="px-5 py-2 border border-slate-200 text-slate-700 rounded-lg hover:bg-slate-50 transition text-sm font-medium">
          Cancelar
        </button>
        <button type="submit" [disabled]="isSaving() || eventForm.invalid"
          class="px-5 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-500 transition disabled:opacity-50 flex items-center gap-2 text-sm font-medium">
          @if (isSaving()) {
            <i class="fas fa-spinner fa-spin"></i> Guardando...
          } @else {
            <i class="fas fa-check"></i> Guardar Evento
          }
        </button>
      </div>
    </form>
  </div>
</div>
