<header class="relative overflow-hidden border-b border-white/10">
  <img
    [src]="course().coverImage"
    alt="Course cover"
    (error)="onImageError($event)"
    class="absolute inset-0 w-full h-full object-cover opacity-20"
  />
  <div class="absolute inset-0 bg-gradient-to-r from-[#070f1d]/95 via-[#08162a]/85 to-[#0a1831]/95"></div>
  <div class="relative max-w-7xl mx-auto px-5 md:px-8 py-8 md:py-10">
    <div class="flex items-start justify-between gap-6">
      <div class="min-w-0 text-white">
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-cyan-400/25 bg-cyan-400/10 text-[10px] md:text-xs font-semibold uppercase tracking-[0.2em] text-cyan-200 mb-4">
          Full Stack Development • 55 horas
        </div>

        <div class="flex items-start gap-3 mb-4">
          <button (click)="onBack.emit()" class="mt-1 w-9 h-9 flex items-center justify-center rounded-full border border-white/15 bg-white/5 hover:bg-white/10 transition-colors" aria-label="Volver">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
            </svg>
          </button>

          <div class="min-w-0">
            <h1 class="text-3xl md:text-5xl font-extrabold leading-tight tracking-tight bg-gradient-to-r from-white via-cyan-200 to-violet-300 bg-clip-text text-transparent">
              {{ course().title }}
            </h1>
          </div>
        </div>

        <div class="flex flex-wrap items-center gap-3 md:gap-4">
          <img
            [src]="course().instructor.avatar"
            alt="Instructor"
            (error)="onImageError($event)"
            class="w-9 h-9 rounded-full border border-cyan-300/40"
          />
          <div>
            <p class="text-sm font-semibold text-gray-100">{{ course().instructor.name }}</p>
            <p class="text-xs uppercase tracking-wide text-cyan-200/80">{{ course().instructor.title }}</p>
          </div>
          <button
            (click)="onContinueLesson.emit()"
            class="ml-0 md:ml-2 px-5 py-2.5 rounded-full bg-gradient-to-r from-cyan-400 to-sky-300 text-[#062033] font-bold text-sm hover:brightness-110 transition-all duration-300 inline-flex items-center gap-2"
          >
            Continuar Lección
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4">
              <path fill-rule="evenodd" d="M4.5 5.653c0-1.426 1.529-2.33 2.779-1.643l11.54 6.348c1.295.712 1.295 2.573 0 3.285L7.28 19.991c-1.25.687-2.779-.217-2.779-1.643V5.653z" clip-rule="evenodd" />
            </svg>
          </button>
        </div>
      </div>

      <div class="hidden md:flex flex-col items-center gap-2 flex-shrink-0 pt-2">
        <div class="relative w-20 h-20">
          <svg class="w-full h-full -rotate-90" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="8" />
            <circle
              cx="50"
              cy="50"
              r="40"
              fill="none"
              stroke="url(#courseProgressGradient)"
              stroke-width="8"
              stroke-linecap="round"
              stroke-dasharray="251.2"
              [attr.stroke-dashoffset]="251.2 - (251.2 * (course().progress || 0)) / 100"
            />
            <defs>
              <linearGradient id="courseProgressGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#22d3ee" />
                <stop offset="100%" stop-color="#60a5fa" />
              </linearGradient>
            </defs>
          </svg>
          <div class="absolute inset-0 flex items-center justify-center text-white font-bold text-xl">{{ course().progress }}%</div>
        </div>
        <p class="text-[11px] uppercase tracking-[0.2em] text-cyan-100/70">Progreso</p>
      </div>
    </div>
  </div>
</header>
