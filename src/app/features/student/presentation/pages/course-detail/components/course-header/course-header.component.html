<header class="bg-white border-b border-slate-200">
  <div class="max-w-7xl mx-auto px-5 md:px-8 py-6 md:py-8">
    <div class="flex items-start justify-between gap-6">
      <div class="min-w-0">
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-indigo-50 text-indigo-700 border border-indigo-200 text-[10px] md:text-xs font-semibold uppercase tracking-widest mb-4">
          Full Stack Development • 55 horas
        </div>

        <div class="flex items-start gap-3 mb-4">
          <button (click)="onBack.emit()" class="mt-1 w-9 h-9 flex items-center justify-center rounded-lg border border-slate-200 hover:bg-slate-50 transition-colors" aria-label="Volver">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-slate-600">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
            </svg>
          </button>

          <div class="min-w-0">
            <h1 class="text-3xl md:text-4xl font-bold text-slate-900 leading-tight">
              {{ course().title }}
            </h1>
          </div>
        </div>

        <div class="flex flex-wrap items-center gap-3 md:gap-4">
          <img
            [src]="course().instructor.avatar"
            alt="Instructor"
            (error)="onImageError($event)"
            class="w-9 h-9 rounded-full border border-slate-200"
          />
          <div>
            <p class="text-sm font-semibold text-slate-900">{{ course().instructor.name }}</p>
            <p class="text-xs text-slate-500">{{ course().instructor.title }}</p>
          </div>
          <button
            (click)="onContinueLesson.emit()"
            class="ml-0 md:ml-2 px-5 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-sm transition-all duration-300 inline-flex items-center gap-2"
          >
            Continuar Lección
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4">
              <path fill-rule="evenodd" d="M4.5 5.653c0-1.426 1.529-2.33 2.779-1.643l11.54 6.348c1.295.712 1.295 2.573 0 3.285L7.28 19.991c-1.25.687-2.779-.217-2.779-1.643V5.653z" clip-rule="evenodd" />
            </svg>
          </button>
        </div>
      </div>

      <div class="hidden md:flex flex-col items-center gap-2 flex-shrink-0 pt-2">
        <div class="relative w-20 h-20">
          <svg class="w-full h-full -rotate-90" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="40" fill="none" stroke="#e2e8f0" stroke-width="8" />
            <circle
              cx="50"
              cy="50"
              r="40"
              fill="none"
              stroke="#4f46e5"
              stroke-width="8"
              stroke-linecap="round"
              stroke-dasharray="251.2"
              [attr.stroke-dashoffset]="251.2 - (251.2 * (course().progress || 0)) / 100"
            />
          </svg>
          <div class="absolute inset-0 flex items-center justify-center text-slate-900 font-bold text-xl">{{ course().progress }}%</div>
        </div>
        <p class="text-[11px] uppercase tracking-widest text-slate-500 font-semibold">Progreso</p>
      </div>
    </div>
  </div>
</header>
