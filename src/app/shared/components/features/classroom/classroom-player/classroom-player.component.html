<div class="relative w-full aspect-video bg-black rounded-2xl overflow-hidden shadow-2xl border border-white/5 group">
  @if (safeUrl(); as url) {
    <iframe
      [src]="url"
      [title]="title()"
      class="w-full h-full"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      allowfullscreen
    ></iframe>
  } @else {
    <div class="absolute inset-0 flex flex-col items-center justify-center text-slate-500 gap-4">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
      </svg>
      <p class="text-sm font-medium">Contenido no disponible</p>
    </div>
  }

  <!-- Overlay de interacción si fuera necesario en el futuro -->
  <div class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity">
    <div class="bg-black/60 backdrop-blur-md px-3 py-1.5 rounded-full border border-white/10 flex items-center gap-2">
      <div class="w-2 h-2 rounded-full bg-teal-500 animate-pulse"></div>
      <span class="text-[10px] uppercase font-bold text-white tracking-widest">En Línea</span>
    </div>
  </div>
</div>
