<div class="relative w-full aspect-video bg-black rounded-3xl overflow-hidden shadow-2xl group/player">
  
  @if (videoState().safeUrl) {
      <iframe
        [src]="videoState().safeUrl!"
        [title]="title()"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen
        class="w-full h-full"
      ></iframe>
  } @else {
    <div class="w-full h-full flex flex-col items-center justify-center text-slate-500 bg-slate-900/50">
      <i class="fas fa-video-slash text-4xl mb-4 opacity-20"></i>
      <p class="text-sm font-medium">No hay video configurado para esta lección</p>
    </div>
  }

  <!-- Overlay de Edición (Solo Admin) -->
  @if (isEditable()) {
    <div class="absolute inset-0 bg-slate-950/60 backdrop-blur-sm opacity-0 group-hover/player:opacity-100 transition-all flex flex-col items-center justify-center gap-6">
      <div class="bg-slate-900/80 p-8 rounded-[2rem] border border-white/10 shadow-2xl flex flex-col items-center gap-4 scale-95 group-hover/player:scale-100 transition-transform">
        <h3 class="text-white font-bold text-lg">Gestionar Contenido</h3>
        <div class="flex gap-3">
          <app-button variant="primary" (onClick)="onEditVideo.emit()">
            <i class="fas fa-link mr-2"></i> Cambiar Link
          </app-button>
          
          <label class="cursor-pointer">
            <div class="flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl font-bold transition-all active:scale-95 bg-slate-800 text-white hover:bg-slate-700">
              <i class="fas fa-cloud-upload-alt"></i> Subir Video
            </div>
            <input 
              type="file" 
              class="hidden" 
              accept="video/*"
              (change)="handleFileSelect($event)"
            />
          </label>
        </div>
        <p class="text-slate-400 text-xs mt-2 italic">Formatos soportados: MP4, WebM (Máx 500MB)</p>
      </div>
    </div>
  }
</div>
