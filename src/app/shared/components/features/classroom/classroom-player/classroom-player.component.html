<div class="relative w-full aspect-video bg-black rounded-xl overflow-hidden shadow-sm">

  @if (videoState().safeUrl) {
      <iframe
        [src]="videoState().safeUrl!"
        [title]="title()"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen
        class="w-full h-full"
      ></iframe>
  } @else {
    <div class="w-full h-full flex flex-col items-center justify-center text-slate-400 bg-slate-100">
      <i class="fas fa-video-slash text-3xl mb-3 opacity-30"></i>
      <p class="text-sm font-medium text-slate-500">No hay video configurado para esta lección</p>
    </div>
  }

  <!-- Overlay de Edición (Solo Admin) -->
  @if (isEditable()) {
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm opacity-0 group-hover/player:opacity-100 transition-all flex flex-col items-center justify-center gap-4">
      <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-xl flex flex-col items-center gap-4 scale-95 group-hover/player:scale-100 transition-transform">
        <h3 class="text-slate-900 font-bold text-lg">Gestionar Contenido</h3>
        <div class="flex gap-3">
          <app-button variant="primary" (onClick)="onEditVideo.emit()">
            <i class="fas fa-link mr-2"></i> Cambiar Link
          </app-button>

          <label class="cursor-pointer">
            <div class="flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl font-semibold transition-all active:scale-95 bg-slate-100 text-slate-700 hover:bg-slate-200 text-sm">
              <i class="fas fa-cloud-upload-alt"></i> Subir Video
            </div>
            <input
              type="file"
              class="hidden"
              accept="video/*"
              (change)="handleFileSelect($event)"
            />
          </label>
        </div>
        <p class="text-slate-400 text-xs mt-1">Formatos soportados: MP4, WebM (Máx 500MB)</p>
      </div>
    </div>
  }
</div>
