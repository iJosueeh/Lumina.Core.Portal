<div class="space-y-4">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
    @for (res of resources(); track res.id) {
      <div class="group p-4 rounded-xl bg-white border border-slate-200 hover:border-indigo-300 hover:shadow-sm transition-all flex items-center justify-between gap-3">
        <div class="flex items-center gap-3 min-w-0">
          <div class="w-10 h-10 rounded-lg bg-indigo-50 flex items-center justify-center text-indigo-600 flex-shrink-0 group-hover:bg-indigo-100 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="getResourceIcon(res.type)" />
            </svg>
          </div>
          <div class="min-w-0">
            <p class="text-sm font-semibold text-slate-900 truncate">{{ res.title }}</p>
            <p class="text-[10px] text-slate-500 uppercase font-semibold tracking-widest">{{ res.type }}</p>
          </div>
        </div>

        <div class="flex items-center gap-1">
            <button
                (click)="openPreview(res)"
                class="p-2 text-slate-400 hover:text-indigo-600 transition-colors rounded-lg hover:bg-indigo-50"
                title="Visualizar"
            >
                <i class="fas fa-eye text-sm"></i>
            </button>

            @if (isDownloadable(res.type)) {
                <button
                    (click)="downloadResource(res)"
                    class="p-2 text-slate-400 hover:text-emerald-600 transition-colors rounded-lg hover:bg-emerald-50"
                    title="Descargar"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                </button>
            }
        </div>
      </div>
    } @empty {
      <div class="col-span-full py-12 text-center border border-dashed border-slate-300 rounded-xl">
        <div class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-3">
          <i class="fas fa-box-open text-lg text-slate-300"></i>
        </div>
        <p class="text-sm text-slate-500 font-medium">No se encontraron recursos disponibles en este nivel.</p>
      </div>
    }
  </div>
</div>

<!-- Modal de Previsualización -->
@if (previewUrl()) {
    <div class="fixed inset-0 z-[110] flex items-center justify-center p-4 md:p-10">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" (click)="closePreview()"></div>

        <div class="relative w-full h-full max-w-6xl bg-white border border-slate-200 rounded-xl shadow-xl overflow-hidden flex flex-col">
            <div class="h-14 border-b border-slate-200 bg-slate-50 flex items-center justify-between px-6 shrink-0">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-red-50 flex items-center justify-center text-red-600">
                        <i class="fas fa-file-pdf text-sm"></i>
                    </div>
                    <h3 class="text-sm font-bold text-slate-900">{{ selectedResource()?.title }}</h3>
                </div>

                <div class="flex items-center gap-2">
                    <button (click)="downloadResource(selectedResource()!)"
                        class="px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white text-[10px] font-semibold uppercase tracking-widest transition-all flex items-center gap-2">
                        <i class="fas fa-download"></i> Descargar
                    </button>
                    <button (click)="closePreview()"
                        class="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-500 hover:text-slate-700 transition-all flex items-center justify-center">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>

            <div class="flex-1 bg-slate-100 p-4">
                <iframe [src]="previewUrl()!" class="w-full h-full rounded-lg border-0 bg-white" frameborder="0"></iframe>
            </div>
        </div>
    </div>
}
