<div class="space-y-6">
  <div class="flex items-center justify-between gap-4 flex-wrap">
    <div class="flex items-center gap-1 p-1 bg-slate-800/60 rounded-xl border border-white/5">
      <button
        (click)="onScopeChange.emit('lesson')"
        [class.bg-teal-500]="scope() === 'lesson'"
        [class.text-slate-900]="scope() === 'lesson'"
        [class.text-slate-400]="scope() !== 'lesson'"
        class="px-4 py-1.5 rounded-lg text-[10px] uppercase font-bold tracking-wider transition-all"
      >
        Lección
      </button>
      <button
        (click)="onScopeChange.emit('section')"
        [class.bg-teal-500]="scope() === 'section'"
        [class.text-slate-900]="scope() === 'section'"
        [class.text-slate-400]="scope() !== 'section'"
        class="px-4 py-1.5 rounded-lg text-[10px] uppercase font-bold tracking-wider transition-all"
      >
        Sección
      </button>
      <button
        (click)="onScopeChange.emit('course')"
        [class.bg-teal-500]="scope() === 'course'"
        [class.text-slate-900]="scope() === 'course'"
        [class.text-slate-400]="scope() !== 'course'"
        class="px-4 py-1.5 rounded-lg text-[10px] uppercase font-bold tracking-wider transition-all"
      >
        Todo el curso
      </button>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
    @for (res of resources(); track res.id) {
      <div class="group p-4 rounded-2xl bg-slate-800/40 border border-white/5 hover:border-teal-500/30 transition-all flex items-center justify-between gap-4">
        <div class="flex items-center gap-3 min-w-0">
          <div class="w-10 h-10 rounded-xl bg-slate-700/50 flex items-center justify-center text-teal-400 flex-shrink-0 group-hover:bg-teal-500 group-hover:text-white transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="getResourceIcon(res.type)" />
            </svg>
          </div>
          <div class="min-w-0">
            <p class="text-sm font-bold text-slate-200 truncate group-hover:text-white transition-colors">{{ res.title }}</p>
            <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">{{ res.type }}</p>
          </div>
        </div>

        <div class="flex items-center gap-2">
            <button
                (click)="openPreview(res)"
                class="p-2 text-slate-500 hover:text-teal-400 transition-colors"
                title="Visualizar"
            >
                <i class="fas fa-eye text-sm"></i>
            </button>

            @if (isDownloadable(res.type)) {
                <button
                    (click)="downloadResource(res)"
                    class="p-2 text-slate-500 hover:text-emerald-400 transition-colors"
                    title="Descargar"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                </button>
            }
        </div>
      </div>
    } @empty {
      <div class="col-span-full py-12 text-center border-2 border-dashed border-white/5 rounded-3xl">
        <p class="text-slate-500 font-medium italic">No se encontraron recursos disponibles en este nivel.</p>
      </div>
    }
  </div>
</div>

<!-- Modal de Previsualización PDF -->
@if (previewUrl()) {
    <div class="fixed inset-0 z-[110] flex items-center justify-center p-4 md:p-10">
        <!-- Backdrop con desenfoque -->
        <div class="absolute inset-0 bg-slate-950/90 backdrop-blur-md" (click)="closePreview()"></div>
        
        <!-- Contenedor del Viewer -->
        <div class="relative w-full h-full max-w-6xl bg-slate-900 border border-white/10 rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col animate-in zoom-in duration-300">
            
            <!-- Toolbar del Viewer -->
            <div class="h-16 border-b border-white/5 bg-white/[0.02] flex items-center justify-between px-8 shrink-0">
                <div class="flex items-center gap-4">
                    <div class="w-8 h-8 rounded-lg bg-red-500/20 flex items-center justify-center text-red-400">
                        <i class="fas fa-file-pdf"></i>
                    </div>
                    <h3 class="text-sm font-black text-white tracking-tight uppercase">{{ selectedResource()?.title }}</h3>
                </div>
                
                <div class="flex items-center gap-3">
                    <button (click)="downloadResource(selectedResource()!)" 
                        class="px-4 py-2 rounded-xl bg-teal-500 hover:bg-teal-400 text-slate-950 text-[10px] font-black uppercase tracking-widest transition-all flex items-center gap-2">
                        <i class="fas fa-download"></i> Descargar
                    </button>
                    <button (click)="closePreview()" 
                        class="w-10 h-10 rounded-xl bg-white/5 hover:bg-white/10 text-slate-500 hover:text-white transition-all flex items-center justify-center">
                        <i class="fas fa-times text-lg"></i>
                    </button>
                </div>
            </div>

            <!-- Iframe Viewer -->
            <div class="flex-1 bg-slate-950/50 p-4">
                <iframe [src]="previewUrl()!" class="w-full h-full rounded-2xl border-0 bg-white" frameborder="0"></iframe>
            </div>
        </div>
    </div>
}
