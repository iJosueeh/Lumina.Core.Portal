<div class="bg-white rounded-xl border border-slate-200 overflow-hidden h-full flex flex-col shadow-sm">
  <div class="p-4 border-b border-slate-200 flex items-center justify-between">
    <div>
      <h3 class="text-sm font-bold text-slate-900">Plan de Estudios</h3>
      <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-0.5 font-semibold">Lecciones</p>
    </div>
    <div class="w-8 h-8 rounded-lg bg-indigo-50 flex items-center justify-center text-indigo-600">
      <i class="fas fa-list-ul text-xs"></i>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto p-3 space-y-3">
    @for (section of sections(); track section.title) {
      <div class="space-y-2">
        <button
          (click)="toggleSection(section.title)"
          class="w-full flex items-center justify-between p-3 rounded-lg bg-slate-50 hover:bg-slate-100 transition-all border border-slate-100"
        >
          <div class="flex items-center gap-2">
            <i class="fas fa-chevron-right text-[10px] text-slate-400 transition-transform duration-300"
               [class.rotate-90]="isSectionExpanded(section.title)"></i>
            <span class="font-semibold text-slate-700 text-sm">{{ section.title }}</span>
          </div>
          <span class="text-[10px] font-semibold px-2 py-0.5 rounded bg-slate-200 text-slate-600">{{ section.videos.length }} clases</span>
        </button>

        @if (isSectionExpanded(section.title)) {
          <div class="space-y-1.5 pl-2">
            @for (lesson of section.videos; track lesson.lessonId) {
              <div
                class="group flex items-center gap-3 p-2.5 rounded-lg transition-all duration-200 border cursor-pointer"
                [class.bg-indigo-50]="activeLessonId() === lesson.lessonId"
                [class.border-indigo-200]="activeLessonId() === lesson.lessonId"
                [class.border-transparent]="activeLessonId() !== lesson.lessonId"
                [class.hover:bg-slate-50]="activeLessonId() !== lesson.lessonId"
                (click)="onLessonSelect.emit(lesson)"
              >
                <button
                  (click)="$event.stopPropagation(); onToggleCompletion.emit(lesson)"
                  class="w-8 h-8 rounded-lg flex items-center justify-center transition-all border shrink-0"
                  [class]="lesson.isCompleted
                    ? 'bg-emerald-50 text-emerald-600 border-emerald-200'
                    : 'bg-slate-100 text-slate-400 border-slate-200'"
                  [attr.aria-label]="lesson.isCompleted ? 'Marcar como pendiente' : 'Marcar como completada'"
                >
                  <i class="fas text-xs" [class]="lesson.isCompleted
                    ? 'fa-check-circle'
                    : lesson.tipo === 'recurso' ? 'fa-archive' : lesson.tipo === 'lectura' ? 'fa-file-alt' : 'fa-play-circle'"></i>
                </button>

                <div class="flex-1 min-w-0">
                  <h4 class="text-sm font-semibold truncate transition-colors"
                      [class.text-indigo-600]="activeLessonId() === lesson.lessonId"
                      [class.text-slate-700]="activeLessonId() !== lesson.lessonId">
                    {{ lesson.title }}
                  </h4>
                  <span class="text-[10px] text-slate-400 font-semibold">{{ lesson.duration }}</span>
                </div>

                @if (isEditable()) {
                  <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button
                      (click)="$event.stopPropagation(); onEditLesson.emit(lesson)"
                      class="w-7 h-7 rounded bg-slate-100 hover:bg-indigo-50 text-slate-400 hover:text-indigo-600 transition-all flex items-center justify-center"
                      title="Editar lección"
                    >
                      <i class="fas fa-pen text-[9px]"></i>
                    </button>
                    <button
                      (click)="$event.stopPropagation(); onDeleteLesson.emit(lesson.lessonId)"
                      class="w-7 h-7 rounded bg-slate-100 hover:bg-red-50 text-slate-400 hover:text-red-500 transition-all flex items-center justify-center"
                      title="Eliminar lección"
                    >
                      <i class="fas fa-trash text-[9px]"></i>
                    </button>
                  </div>
                }
              </div>
            }

            @if (isEditable()) {
              <button
                (click)="onAddLesson.emit(section.title)"
                class="w-full flex items-center justify-center gap-2 p-2.5 rounded-lg border border-dashed border-slate-300 text-slate-400 hover:border-indigo-300 hover:text-indigo-600 transition-all"
              >
                <i class="fas fa-plus-circle text-xs"></i>
                <span class="text-[10px] font-semibold uppercase tracking-widest">Añadir Lección</span>
              </button>
            }
          </div>
        }
      </div>
    }
  </div>
</div>
