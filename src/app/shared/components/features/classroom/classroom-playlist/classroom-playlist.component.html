<div class="bg-slate-900/60 backdrop-blur-xl rounded-[2.5rem] border border-slate-800/80 overflow-hidden h-full flex flex-col shadow-2xl">
  <div class="p-6 border-b border-slate-800/50 flex items-center justify-between bg-slate-950/20">
    <div>
      <h3 class="text-xl font-black text-white tracking-tight">Contenido del Curso</h3>
      <p class="text-xs text-slate-500 uppercase tracking-widest mt-1 font-bold">Plan de estudios</p>
    </div>
    <div class="w-10 h-10 rounded-xl bg-cyan-500/10 flex items-center justify-center text-cyan-400 border border-cyan-500/20">
      <i class="fas fa-list-ul"></i>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-4">
    @for (section of sections(); track section.title) {
      <div class="space-y-2">
        <!-- Section Header -->
        <button 
          (click)="toggleSection(section.title)"
          class="w-full flex items-center justify-between p-4 rounded-2xl bg-slate-800/30 hover:bg-slate-800/50 transition-all border border-slate-800/50 group"
        >
          <div class="flex items-center gap-3">
            <i class="fas fa-chevron-right text-[10px] text-slate-500 transition-transform duration-300"
               [class.rotate-90]="isSectionExpanded(section.title)"></i>
            <span class="font-bold text-slate-300 text-sm tracking-wide">{{ section.title }}</span>
          </div>
          <span class="text-[10px] font-black px-2 py-1 rounded-md bg-slate-900 text-slate-500 uppercase">{{ section.videos.length }} clases</span>
        </button>

        <!-- Lessons in Section -->
        @if (isSectionExpanded(section.title)) {
          <div class="space-y-2 pl-2 animate-fade-in">
            @for (lesson of section.videos; track lesson.lessonId) {
              <div 
                class="group flex items-center gap-3 p-3 rounded-2xl transition-all duration-300 border border-transparent"
                [class.bg-cyan-500/10]="activeLessonId() === lesson.lessonId"
                [class.border-cyan-500/30]="activeLessonId() === lesson.lessonId"
                [class.hover:bg-slate-800/40]="activeLessonId() !== lesson.lessonId"
                (click)="onLessonSelect.emit(lesson)"
              >
                <!-- Lesson Status Icon -->
                <button 
                  (click)="$event.stopPropagation(); onToggleCompletion.emit(lesson)"
                  class="w-10 h-10 rounded-xl flex items-center justify-center transition-all border shrink-0"
                  [class]="lesson.isCompleted 
                    ? 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30' 
                    : 'bg-slate-800 text-slate-500 border-slate-700'"
                >
                  <i class="fas" [class]="lesson.isCompleted ? 'fa-check-circle' : 'fa-play-circle'"></i>
                </button>

                <!-- Lesson Info -->
                <div class="flex-1 min-w-0 cursor-pointer">
                  <h4 class="text-sm font-bold truncate transition-colors"
                      [class.text-cyan-400]="activeLessonId() === lesson.lessonId"
                      [class.text-slate-300]="activeLessonId() !== lesson.lessonId">
                    {{ lesson.title }}
                  </h4>
                  <span class="text-[10px] font-medium text-slate-500 uppercase tracking-tighter">{{ lesson.duration }}</span>
                </div>

                <!-- Admin Action Buttons (Visible only if isEditable) -->
                @if (isEditable()) {
                  <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button 
                      (click)="$event.stopPropagation(); onEditLesson.emit(lesson)"
                      class="w-8 h-8 rounded-lg bg-slate-800 hover:bg-blue-500/20 text-slate-400 hover:text-blue-400 transition-all flex items-center justify-center"
                      title="Editar lección"
                    >
                      <i class="fas fa-pen text-[10px]"></i>
                    </button>
                    <button 
                      (click)="$event.stopPropagation(); onDeleteLesson.emit(lesson.lessonId)"
                      class="w-8 h-8 rounded-lg bg-slate-800 hover:bg-red-500/20 text-slate-400 hover:text-red-400 transition-all flex items-center justify-center"
                      title="Eliminar lección"
                    >
                      <i class="fas fa-trash text-[10px]"></i>
                    </button>
                  </div>
                }
              </div>
            }

            <!-- Admin: Add Lesson Button -->
            @if (isEditable()) {
              <button 
                (click)="onAddLesson.emit(section.title)"
                class="w-full flex items-center justify-center gap-2 p-3 rounded-2xl border border-dashed border-slate-700 text-slate-500 hover:border-cyan-500/50 hover:text-cyan-400 transition-all group/add"
              >
                <i class="fas fa-plus-circle text-xs group-hover/add:scale-110 transition-transform"></i>
                <span class="text-xs font-bold uppercase tracking-widest">Añadir Lección</span>
              </button>
            }
          </div>
        }
      </div>
    }
  </div>
</div>
