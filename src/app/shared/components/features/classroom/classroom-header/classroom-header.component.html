<header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between gap-6 sticky top-0 z-50">
  <div class="flex items-center gap-4 min-w-0">
    <button
      (click)="onBack.emit()"
      class="w-9 h-9 rounded-lg border border-slate-200 flex items-center justify-center text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-all flex-shrink-0"
      aria-label="Volver"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </button>

    <div class="min-w-0">
      <h1 class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest truncate">{{ courseTitle() }}</h1>
      <p class="text-sm font-bold text-slate-900 truncate mt-0.5">{{ lessonTitle() }}</p>
    </div>
  </div>

  <div class="hidden md:flex items-center gap-6">
    <div class="flex items-center gap-3">
      <button
        [disabled]="!hasPrevious()"
        (click)="onPrevious.emit()"
        class="p-2 text-slate-400 hover:text-slate-900 disabled:opacity-20 disabled:cursor-not-allowed transition-colors"
        aria-label="Lección anterior"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
        </svg>
      </button>

      <button
        [disabled]="!hasNext()"
        (click)="onNext.emit()"
        class="px-5 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-sm transition-all disabled:opacity-20 disabled:cursor-not-allowed"
      >
        Siguiente Lección
      </button>
    </div>

    <div class="h-8 w-px bg-slate-200"></div>

    <div class="flex items-center gap-4">
      <div class="text-right">
        <p class="text-[10px] text-slate-500 font-semibold uppercase tracking-widest">Tu Progreso</p>
        <div class="flex items-center gap-3 mt-1">
          <div class="w-28 h-1.5 bg-slate-200 rounded-full overflow-hidden">
            <div class="h-full bg-indigo-600" [style.width.%]="progress()"></div>
          </div>
          <span class="text-xs font-bold text-slate-900">{{ progress() }}%</span>
        </div>
      </div>

      <button
        (click)="onToggleAutoplay.emit()"
        class="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-slate-200 hover:bg-slate-50 transition-all"
      >
        <div class="relative w-8 h-4 bg-slate-300 rounded-full transition-colors" [class.bg-indigo-600]="autoplay()">
          <div class="absolute top-0.5 left-0.5 w-3 h-3 bg-white rounded-full transition-transform" [class.translate-x-4]="autoplay()"></div>
        </div>
        <span class="text-[10px] font-semibold text-slate-500 uppercase tracking-widest">Autoplay</span>
      </button>
    </div>
  </div>
</header>
