<div
  class="group bg-slate-900/60 backdrop-blur-sm border border-slate-800/80 rounded-[2rem] overflow-hidden hover:border-cyan-500/30 hover:bg-slate-900/80 transition-all duration-500 cursor-pointer flex flex-col h-full hover:shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)]"
  (click)="onView.emit(data().id)"
>
  <!-- Imagen del Curso -->
  <div class="relative h-52 overflow-hidden">
    <img
      [src]="data().coverImage"
      [alt]="data().titulo"
      (error)="onImageError($event)"
      class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 opacity-70 group-hover:opacity-100"
    />
    <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/20 to-transparent"></div>
    
    <!-- Modalidad Badge -->
    <div class="absolute top-4 left-4">
      @if (data().modalidad) {
        <span class="px-3 py-1 rounded-full bg-cyan-500/10 backdrop-blur-md border border-cyan-500/30 text-cyan-400 text-[10px] font-black uppercase tracking-[0.15em]">
          {{ data().modalidad }}
        </span>
      }
    </div>
  </div>

  <!-- Contenido -->
  <div class="p-6 sm:p-8 flex-1 flex flex-col">
    <div class="mb-6">
      <div class="flex items-center gap-2 mb-3">
        <span class="w-1.5 h-1.5 rounded-full bg-cyan-500 shadow-[0_0_8px_rgba(34,211,238,0.6)]"></span>
        <p class="text-[10px] sm:text-[11px] font-black text-slate-500 uppercase tracking-[0.2em]">{{ data().codigo }}</p>
      </div>
      <h3 class="text-xl sm:text-2xl font-black text-white group-hover:text-cyan-400 transition-colors duration-300 leading-tight line-clamp-2">
        {{ data().titulo }}
      </h3>
    </div>

    <!-- Progreso o Estadísticas -->
    <div class="mt-auto space-y-8">
      
      <!-- Estudiante: Progreso -->
      @if (role() === 'student' && data().progreso !== undefined) {
        <div class="space-y-4">
          <div class="flex items-center justify-between text-[10px] sm:text-[11px] font-black uppercase tracking-[0.15em]">
            <span class="text-slate-500">Progreso</span>
            <span class="text-cyan-300">{{ data().progreso }}%</span>
          </div>
          <div class="h-1.5 bg-slate-800/80 rounded-full overflow-hidden">
            <div 
              class="h-full rounded-full transition-all duration-1000 ease-out" 
              [class]="progressColor()"
              [style.width.%]="data().progreso"
            ></div>
          </div>
        </div>
      }

      <!-- Footer de Tarjeta -->
      <div class="flex items-center justify-between pt-6 border-t border-slate-800/50">
        <div class="flex items-center gap-3">
          <div class="w-1.5 h-1.5 rounded-full bg-slate-700"></div>
          <span class="text-[9px] sm:text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">{{ data().nivel || 'Básico' }}</span>
        </div>
        
        <div class="flex items-center gap-2.5 text-cyan-500 text-[10px] sm:text-[11px] font-black uppercase tracking-[0.2em] group/btn py-1.5 px-3 rounded-xl hover:bg-cyan-500/5 transition-all">
          Detalles
          <i class="fas fa-arrow-right text-[9px] group-hover/btn:translate-x-1 transition-transform"></i>
        </div>
      </div>
    </div>
  </div>
</div>
