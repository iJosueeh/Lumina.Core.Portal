<div class="fixed inset-0 z-[80] flex items-center justify-center p-6">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" (click)="onClose.emit()"></div>

  <!-- Modal -->
  <div class="relative w-full max-w-5xl h-[85vh] bg-white rounded-2xl shadow-2xl border border-slate-200 overflow-hidden flex flex-col">
    <!-- Header -->
    <div class="flex items-center justify-between gap-4 px-6 py-4 border-b border-slate-200 bg-white">
      <div class="min-w-0">
        <p class="text-[10px] uppercase font-black text-indigo-500 tracking-[0.2em] mb-0.5">{{ subtitle() }}</p>
        <h3 class="text-base font-bold text-slate-900 truncate">{{ file().titulo }}</h3>
      </div>

      <div class="flex items-center gap-2">
        <button
          (click)="onDownload.emit(file())"
          class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-xs transition-all shadow-sm">
          <i class="fas fa-download text-[10px]"></i>
          Descargar
        </button>

        <button
          (click)="onClose.emit()"
          class="w-9 h-9 inline-flex items-center justify-center rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-400 hover:text-slate-600 transition-all">
          <i class="fas fa-times text-sm"></i>
        </button>
      </div>
    </div>

    <!-- Viewer Body -->
    <div class="flex-1 relative overflow-hidden">
      @if (safeUrl()) {
        <iframe
          [src]="safeUrl()"
          class="w-full h-full border-0 bg-slate-50"
          title="Vista previa">
        </iframe>
      } @else {
        <div class="absolute inset-0 flex flex-col items-center justify-center gap-4 text-slate-400">
          <div class="w-16 h-16 rounded-2xl bg-slate-100 flex items-center justify-center">
            <i class="fas fa-file-circle-xmark text-2xl text-slate-300"></i>
          </div>
          <p class="font-semibold text-sm text-slate-500">No se pudo cargar la vista previa</p>
          <button (click)="onDownload.emit(file())"
            class="text-indigo-600 hover:text-indigo-500 text-xs font-bold uppercase tracking-widest transition-colors">
            Descargar directamente
          </button>
        </div>
      }
    </div>
  </div>
</div>
