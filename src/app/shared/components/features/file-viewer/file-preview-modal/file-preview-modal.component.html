<div class="fixed inset-0 z-[80] flex items-center justify-center p-4 bg-black/75 backdrop-blur-md animate-in fade-in duration-300">
  <div class="relative w-full max-w-6xl h-[90vh] bg-[#0f172a] border border-white/10 rounded-[2rem] shadow-2xl overflow-hidden flex flex-col scale-in">
    <!-- Header -->
    <div class="flex items-center justify-between gap-4 px-6 py-5 border-b border-white/5 bg-[#1e293b]/50">
      <div class="min-w-0">
        <p class="text-[10px] uppercase font-black text-teal-400 tracking-[0.25em] mb-1">{{ subtitle() }}</p>
        <h3 class="text-lg font-bold text-white truncate">{{ file().titulo }}</h3>
      </div>
      
      <div class="flex items-center gap-3">
        <button
          (click)="onDownload.emit(file())"
          class="inline-flex items-center gap-2 px-5 py-2.5 rounded-full bg-teal-500 hover:bg-teal-400 text-slate-900 font-bold text-sm transition-all"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
          </svg>
          Descargar
        </button>

        <button
          (click)="onClose.emit()"
          class="w-10 h-10 inline-flex items-center justify-center rounded-full bg-white/5 text-slate-400 hover:text-white hover:bg-white/10 transition-all"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Viewer Body -->
    <div class="flex-1 bg-black/40 relative">
      @if (safeUrl(); as url) {
        <iframe
          [src]="url"
          class="w-full h-full border-0 bg-white"
          title="File Viewer"
        ></iframe>
      } @else {
        <div class="absolute inset-0 flex flex-col items-center justify-center gap-4 text-slate-500">
          <div class="w-20 h-20 rounded-3xl bg-slate-800/50 flex items-center justify-center mb-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
          </div>
          <p class="font-bold text-sm tracking-wide">No se pudo cargar la vista previa</p>
          <button (click)="onDownload.emit(file())" class="text-teal-500 hover:text-teal-400 text-xs font-bold uppercase tracking-widest transition-colors">
            Intentar descargar directamente
          </button>
        </div>
      }
    </div>
  </div>
</div>
