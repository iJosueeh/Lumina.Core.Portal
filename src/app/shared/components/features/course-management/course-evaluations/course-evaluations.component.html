<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
    @if (isLoading()) {
        @for (i of [1,2,3]; track i) {
            <div class="h-44 bg-white rounded-xl border border-slate-200 p-6 animate-pulse shadow-sm">
                <div class="h-full w-full rounded-lg bg-slate-100"></div>
            </div>
        }
    } @else {
        @for (ev of evaluaciones(); track ev.id) {
            <div class="group bg-white border border-slate-200 p-5 rounded-xl hover:border-indigo-300 hover:shadow-md transition-all relative overflow-hidden flex flex-col">

                <div class="flex justify-between items-start mb-4">
                    <div class="w-11 h-11 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-600">
                        <i class="fas fa-file-invoice text-lg"></i>
                    </div>
                    <span class="px-2.5 py-1 bg-slate-100 text-[9px] font-bold text-slate-500 uppercase tracking-widest rounded-lg border border-slate-200">{{ ev.estado }}</span>
                </div>

                <div class="space-y-1 mb-4">
                    <h3 class="text-base font-bold text-slate-900 leading-tight group-hover:text-indigo-600 transition-colors truncate">
                        {{ ev.titulo }}
                    </h3>
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">{{ ev.tipoEvaluacion }}</p>
                </div>

                <!-- Meta Info -->
                <div class="grid grid-cols-3 gap-2 mt-auto">
                    <div class="bg-slate-50 p-2.5 rounded-lg border border-slate-100 flex flex-col items-center justify-center">
                        <p class="text-[7px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Puntaje</p>
                        <p class="text-xs font-bold text-slate-800">{{ ev.puntajeMaximo }} pts</p>
                    </div>
                    <button (click)="onConfig.emit(ev)" class="bg-slate-50 p-2.5 rounded-lg border border-slate-100 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 transition-all flex items-center justify-center" title="Configurar Evaluación">
                        <i class="fas fa-cog text-xs"></i>
                    </button>
                    <button (click)="onEdit.emit(ev)" class="bg-slate-50 p-2.5 rounded-lg border border-slate-100 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 transition-all flex items-center justify-center" title="Editar Preguntas">
                        <i class="fas fa-list-ul text-xs"></i>
                    </button>
                </div>
            </div>
        } @empty {
            <div class="col-span-full py-16 text-center bg-white rounded-xl border border-dashed border-slate-300">
                <i class="fas fa-clipboard-list text-2xl text-slate-300 mb-2 block"></i>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">No hay evaluaciones registradas para este curso.</p>
            </div>
        }
    }
</div>
