<div class="fixed inset-0 z-[100] flex items-center justify-center p-6">
    <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" (click)="onClose.emit()"></div>

    <div class="relative bg-white border border-slate-200 w-full max-w-4xl rounded-2xl shadow-xl overflow-hidden">
        <div class="p-8 space-y-6">

            <!-- Header -->
            <div class="flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-black text-slate-900 tracking-tight">Editar Curso</h2>
                    <p class="text-[10px] text-slate-400 font-semibold uppercase tracking-widest mt-0.5">
                        Modifica los campos que necesites y guarda
                    </p>
                </div>
                <button type="button" (click)="onClose.emit()" [disabled]="isSaving()"
                    class="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center text-slate-400 hover:text-slate-600 transition-all disabled:opacity-30">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <form [formGroup]="courseForm" (ngSubmit)="submit()" class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 max-h-[55vh] overflow-y-auto pr-2">
                    <div class="md:col-span-2 space-y-1.5">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Nombre del Curso</label>
                        <input type="text" formControlName="nombre" placeholder="Ej: Especialización en Arquitectura .NET"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-all text-sm font-medium placeholder:text-slate-300">
                    </div>

                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Código</label>
                        <input type="text" formControlName="codigo" placeholder="Ej: DOTNET-101"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-all text-sm font-medium placeholder:text-slate-300">
                    </div>

                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Docente Asignado</label>
                        <select formControlName="instructorId" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-all text-sm font-medium appearance-none">
                            <option [ngValue]="null" disabled>Seleccionar docente...</option>
                            @for (d of docentes; track d.id) {
                                <option [ngValue]="d.id">{{ d.nombreCompleto }}</option>
                            }
                        </select>
                    </div>

                    <div class="md:col-span-2 space-y-1.5">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Descripción</label>
                        <textarea formControlName="descripcion" rows="3" placeholder="Describe los objetivos del curso..."
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-all resize-none text-sm leading-relaxed placeholder:text-slate-300"></textarea>
                    </div>

                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Categoría</label>
                        <select formControlName="categoria" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-all text-sm font-medium appearance-none">
                            @for (cat of categories(); track cat) {
                                <option [value]="cat">{{ cat }}</option>
                            }
                        </select>
                    </div>

                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Nivel</label>
                        <select formControlName="nivel" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-all text-sm font-medium appearance-none">
                            @for (lvl of levels; track lvl) {
                                <option [value]="lvl">{{ lvl }}</option>
                            }
                        </select>
                    </div>

                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Capacidad</label>
                        <input type="number" formControlName="capacidad"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-all text-sm font-medium">
                    </div>

                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Duración</label>
                        <input type="text" formControlName="duracion" placeholder="Ej: 40h"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-all text-sm font-medium placeholder:text-slate-300">
                    </div>

                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Créditos</label>
                        <input type="number" formControlName="creditos"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-all text-sm font-medium">
                    </div>

                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Ciclo</label>
                        <input type="text" formControlName="ciclo" placeholder="2024-1"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-all text-sm font-medium placeholder:text-slate-300">
                    </div>

                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Estado</label>
                        <select formControlName="estadoCurso" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-all text-sm font-medium appearance-none">
                            <option value="Activo">Activo / Público</option>
                            <option value="Borrador">Borrador / Privado</option>
                            <option value="Archivado">Archivado</option>
                        </select>
                    </div>

                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Precio (S/)</label>
                        <input type="number" formControlName="precio" min="0"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-all text-sm font-medium">
                    </div>

                    <!-- Imagen -->
                    <div class="md:col-span-2 space-y-1.5">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Imagen de Portada</label>
                        <div class="flex gap-4 items-center">
                            <div class="relative flex-1">
                                <input type="text" formControlName="imagenUrl"
                                    placeholder="URL de la imagen o sube un archivo..."
                                    class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-all placeholder:text-slate-300">
                            </div>
                            <label class="cursor-pointer bg-slate-100 hover:bg-slate-200 border border-slate-200 rounded-xl w-12 h-12 flex items-center justify-center text-slate-400 hover:text-indigo-600 transition-all relative overflow-hidden"
                                   [class.opacity-50]="isUploading()">
                                @if (isUploading()) {
                                    <i class="fas fa-spinner fa-spin"></i>
                                } @else {
                                    <i class="fas fa-cloud-upload-alt text-lg"></i>
                                }
                                <input type="file" (change)="onFileSelected($event)" class="hidden" accept="image/*" [disabled]="isUploading()">
                            </label>
                            @if (courseForm.get('imagenUrl')?.value) {
                                <div class="w-12 h-12 rounded-xl border border-slate-200 overflow-hidden bg-slate-50 shrink-0">
                                    <img [src]="courseForm.get('imagenUrl')?.value" class="w-full h-full object-cover" alt="Preview">
                                </div>
                            }
                        </div>
                    </div>
                </div>

                <!-- Acciones -->
                <div class="flex gap-3 pt-2">
                    <button type="button" (click)="onClose.emit()"
                        class="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold rounded-xl transition-all text-sm">
                        Cancelar
                    </button>
                    <button type="submit" [disabled]="courseForm.invalid || isSaving()"
                        class="flex-[2] py-3 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-30 text-white font-semibold rounded-xl transition-all shadow-sm text-sm flex items-center justify-center gap-2">
                        @if (isSaving()) {
                            <i class="fas fa-spinner fa-spin"></i> Guardando...
                        } @else {
                            <i class="fas fa-check"></i> Guardar Cambios
                        }
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
