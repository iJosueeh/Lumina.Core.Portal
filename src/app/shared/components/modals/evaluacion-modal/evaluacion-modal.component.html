<div class="fixed inset-0 z-[100] flex items-center justify-center p-6">
    <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" (click)="onClose.emit()"></div>

    <div class="relative bg-white border border-slate-200 w-full max-w-2xl rounded-2xl shadow-xl overflow-hidden animate-in fade-in zoom-in duration-300">
        <div class="p-8 space-y-6">

            <!-- Header -->
            <div class="flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-bold text-slate-900">
                        {{ isEditMode() ? 'Configurar Evaluación' : 'Nueva Evaluación' }}
                    </h2>
                    <p class="text-[10px] text-slate-400 font-semibold uppercase tracking-widest mt-0.5">
                        {{ isEditMode() ? 'Modifica los parámetros de la evaluación' : 'Define título, fechas y puntaje del examen' }}
                    </p>
                </div>
                <button (click)="onClose.emit()" [disabled]="isSaving()"
                    class="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center text-slate-400 hover:text-slate-600 transition-all disabled:opacity-30">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <form [formGroup]="evaluacionForm" (ngSubmit)="submit()" class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

                    <!-- Título -->
                    <div class="md:col-span-2 space-y-1.5">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Título de la Evaluación</label>
                        <input type="text" formControlName="titulo" placeholder="Ej: Examen Parcial de Algoritmos"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-all text-sm font-medium placeholder:text-slate-300">
                    </div>

                    <!-- Descripción -->
                    <div class="md:col-span-2 space-y-1.5">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Descripción / Instrucciones</label>
                        <textarea formControlName="descripcion" rows="2" placeholder="Define el objetivo o instrucciones..."
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-all resize-none text-sm leading-relaxed placeholder:text-slate-300"></textarea>
                    </div>

                    <!-- Tipo -->
                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Tipo de Evaluación</label>
                        <select formControlName="tipoEvaluacion" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-all text-sm font-medium appearance-none">
                            <option [ngValue]="null" disabled>Seleccionar tipo...</option>
                            <option [ngValue]="1">Examen</option>
                            <option [ngValue]="2">Tarea</option>
                            <option [ngValue]="3">Proyecto</option>
                            <option [ngValue]="4">Quizz / Test</option>
                        </select>
                    </div>

                    <!-- Puntaje -->
                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Puntaje Máximo</label>
                        <input type="number" formControlName="puntajeMaximo"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-all text-sm font-medium placeholder:text-slate-300">
                    </div>

                    <!-- Fecha Inicio -->
                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Fecha de Inicio</label>
                        <input type="datetime-local" formControlName="fechaInicio"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-all text-sm font-medium">
                    </div>

                    <!-- Fecha Fin -->
                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Fecha de Cierre</label>
                        <input type="datetime-local" formControlName="fechaFin"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-all text-sm font-medium">
                    </div>

                    <!-- Intentos -->
                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Intentos Permitidos</label>
                        <input type="number" formControlName="intentosPermitidos"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-all text-sm font-medium">
                    </div>
                </div>

                <!-- Footer -->
                <div class="flex gap-3 pt-2">
                    <button type="button" (click)="onClose.emit()" [disabled]="isSaving()"
                        class="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold rounded-xl transition-all text-sm disabled:opacity-30">
                        Cancelar
                    </button>
                    <button type="submit" [disabled]="evaluacionForm.invalid || isSaving()"
                        class="flex-[2] py-3 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-30 text-white font-semibold rounded-xl transition-all shadow-sm text-sm flex items-center justify-center gap-2">
                        @if (isSaving()) {
                            <i class="fas fa-spinner fa-spin"></i>
                            Procesando...
                        } @else {
                            {{ isEditMode() ? 'Actualizar Evaluación' : 'Crear Evaluación' }}
                        }
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
