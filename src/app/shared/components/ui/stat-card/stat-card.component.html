<div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition-shadow group">
    <div class="flex items-start justify-between mb-4">
        <span class="text-gray-500 font-medium text-xs tracking-wider uppercase">{{label}}</span>
        <div class="p-2 rounded-lg" [ngClass]="iconBgClass">
            <i [class]="'fas fa-' + icon + ' w-5 h-5 flex items-center justify-center'"></i>
        </div>
    </div>
    <div class="flex items-baseline gap-3 mb-1">
        <span class="text-3xl font-bold text-gray-900">{{value}}</span>
        @if (trend) {
          <span [class]="trendType === 'positive' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'" class="px-2 py-0.5 rounded text-xs font-bold">
              {{trend}}
          </span>
        }
    </div>
    <p class="text-sm text-gray-500">{{description}}</p>
</div>
