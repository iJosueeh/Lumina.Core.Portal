<select
  [disabled]="disabled"
  [(ngModel)]="value"
  (ngModelChange)="onOptionChange.emit($event)"
  (blur)="onTouched()"
  class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-900 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all disabled:opacity-50 appearance-none cursor-pointer"
>
  @for (option of options; track option) {
    <option [value]="option">{{ option }}</option>
  }
</select>
