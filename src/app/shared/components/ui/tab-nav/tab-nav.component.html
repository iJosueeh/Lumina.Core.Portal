<div
  class="inline-flex items-center gap-1 p-1 rounded-xl bg-slate-100 overflow-x-auto no-scrollbar"
  role="tablist"
  [attr.aria-label]="'Navegación de pestañas'"
>
  @for (tab of tabs(); track tab.id) {
    <button
      (click)="selectTab(tab.id)"
      role="tab"
      [attr.aria-selected]="activeTabId() === tab.id"
      [attr.aria-controls]="'panel-' + tab.id"
      [id]="'tab-' + tab.id"
      [class.bg-white]="activeTabId() === tab.id"
      [class.text-indigo-600]="activeTabId() === tab.id"
      [class.shadow-sm]="activeTabId() === tab.id"
      [class.font-semibold]="activeTabId() === tab.id"
      [class.text-slate-500]="activeTabId() !== tab.id"
      class="flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm transition-all duration-200 whitespace-nowrap hover:text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
    >
      @if (tab.icon) {
        <i [class]="'fas fa-' + tab.icon + ' text-xs'" aria-hidden="true"></i>
      }
      {{ tab.label }}
    </button>
  }
</div>
