<div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm hover:shadow-xl hover:shadow-slate-200/50 transition-all duration-300 group">
    <div class="flex items-start gap-4">
        <app-file-type-icon [type]="material.tipo" size="lg"></app-file-type-icon>
        
        <div class="flex-1 min-w-0">
            <div class="flex items-center justify-between mb-1">
                <h3 class="text-base font-bold text-slate-800 truncate group-hover:text-teal-600 transition-colors">{{ material.titulo }}</h3>
                <div class="flex items-center gap-1">
                    <app-button variant="ghost" (onClick)="edit.emit(material)" class="!p-1.5 opacity-0 group-hover:opacity-100 transition-all">
                        <i class="fas fa-edit text-slate-400"></i>
                    </app-button>
                    <app-button variant="ghost" (onClick)="delete.emit(material.id)" class="!p-1.5 opacity-0 group-hover:opacity-100 transition-all">
                        <i class="fas fa-trash-alt text-red-400"></i>
                    </app-button>
                </div>
            </div>
            <p class="text-xs text-slate-400 line-clamp-2 mb-4 leading-relaxed">{{ material.descripcion }}</p>
            
            <div class="flex items-center justify-between pt-4 border-t border-slate-50">
                <div class="flex items-center gap-3">
                    <span class="flex items-center gap-1.5 text-[10px] font-bold text-slate-400 uppercase tracking-wider">
                        <i class="fas fa-database opacity-50"></i> {{ material.tamano }}
                    </span>
                    <span class="flex items-center gap-1.5 text-[10px] font-bold text-slate-400 uppercase tracking-wider">
                        <i class="fas fa-calendar opacity-50"></i> {{ material.fechaSubida | date:'dd MMM, yyyy' }}
                    </span>
                </div>
                <div class="flex items-center gap-1 text-[10px] font-bold text-teal-600 bg-teal-50 px-2 py-1 rounded-lg">
                    <i class="fas fa-download"></i> {{ material.descargas }}
                </div>
            </div>
        </div>
    </div>
</div>
