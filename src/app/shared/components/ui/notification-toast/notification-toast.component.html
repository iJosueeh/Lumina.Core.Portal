@if (notificationService.notification(); as note) {
  <div class="fixed top-6 right-6 left-6 md:left-auto md:w-96 z-[9999] pointer-events-none">
    <div [class]="getTypeClass(note.type)"
         [class.animate-toast-in]="!notificationService.notificationClosing()"
         [class.animate-toast-out]="notificationService.notificationClosing()"
         class="pointer-events-auto flex items-center gap-4 p-4 rounded-3xl border backdrop-blur-xl shadow-2xl relative overflow-hidden">
      
      <!-- Progress Bar Background -->
      <div class="absolute bottom-0 left-0 h-1 bg-white/10 w-full"></div>
      <!-- Animated Progress Bar -->
      <div class="absolute bottom-0 left-0 h-1 bg-current transition-all linear"
           [style.width.%]="notificationService.notificationClosing() ? 0 : 100"
           [style.transition-duration.ms]="notificationService.notificationDuration()">
      </div>

      <!-- Icon -->
      <div class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center shrink-0 border border-white/5 shadow-inner">
        <i class="fas" [ngClass]="getIcon(note.type) + ' text-xl'"></i>
      </div>

      <!-- Content -->
      <div class="flex-1 min-w-0 py-1">
        <p class="text-[10px] font-black uppercase tracking-[0.2em] opacity-50 mb-0.5">
          {{ note.type === 'success' ? 'Éxito' : note.type === 'error' ? 'Atención' : 'Información' }}
        </p>
        <p class="text-sm font-bold text-white leading-tight truncate-multiline">
          {{ note.message }}
        </p>
      </div>

      <!-- Close Button -->
      <button (click)="notificationService.close()" 
              class="w-10 h-10 rounded-xl hover:bg-white/10 flex items-center justify-center transition-colors group">
        <i class="fas fa-times text-xs opacity-30 group-hover:opacity-100 transition-opacity"></i>
      </button>
    </div>
  </div>
}
