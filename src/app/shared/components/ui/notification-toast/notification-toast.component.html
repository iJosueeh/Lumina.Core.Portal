@if (notification(); as note) {
  <div class="fixed top-6 right-6 left-6 md:left-auto md:w-96 z-[9999] pointer-events-none">
    <div [class]="getStyle(note.type)"
         [class.animate-toast-in]="!isClosing()"
         [class.animate-toast-out]="isClosing()"
         class="pointer-events-auto flex items-center gap-3 p-4 rounded-xl border-l-4 border bg-white shadow-lg">

      <!-- Icon -->
      <div class="w-10 h-10 rounded-lg flex items-center justify-center shrink-0"
           [ngClass]="{
             'bg-emerald-100 text-emerald-600': note.type === 'success',
             'bg-red-100 text-red-600': note.type === 'error',
             'bg-blue-100 text-blue-600': note.type === 'info'
           }">
        <i class="fas" [ngClass]="getIcon(note.type)"></i>
      </div>

      <!-- Content -->
      <div class="flex-1 min-w-0">
        <p class="text-[10px] font-bold uppercase tracking-widest opacity-60 mb-0.5">
          {{ getLabel(note.type) }}
        </p>
        <p class="text-sm font-semibold leading-tight truncate-multiline">
          {{ note.message }}
        </p>
      </div>

      <!-- Close -->
      <button (click)="close()"
              class="w-8 h-8 rounded-lg hover:bg-slate-100 flex items-center justify-center transition-colors text-slate-400 hover:text-slate-600 shrink-0">
        <i class="fas fa-times text-xs"></i>
      </button>
    </div>
  </div>
}
