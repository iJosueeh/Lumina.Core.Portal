<div class="space-y-1.5 w-full">
  @if (label) {
    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">
      {{ label }}
      @if (required) { <span class="text-red-500">*</span> }
    </label>
  }
  <div class="relative group">
    <ng-content></ng-content>
  </div>
  @if (error) {
    <p class="text-xs text-red-500 font-medium ml-1 animate-in fade-in slide-in-from-top-1">{{ error }}</p>
  }
</div>
