<input
  [type]="type"
  [placeholder]="placeholder"
  [disabled]="disabled"
  [readonly]="readonly"
  [(ngModel)]="value"
  (blur)="onTouched()"
  [ngClass]="inputClasses"
  class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 placeholder:text-slate-400 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all disabled:opacity-50"
/>
