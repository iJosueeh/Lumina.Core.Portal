<input
  [type]="type"
  [placeholder]="placeholder"
  [disabled]="disabled"
  [readonly]="readonly"
  [(ngModel)]="value"
  (blur)="onTouched()"
  [ngClass]="inputClasses"
  class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500 outline-none transition-all disabled:opacity-50"
/>
