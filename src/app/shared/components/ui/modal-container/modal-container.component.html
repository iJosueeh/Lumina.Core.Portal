<div class="fixed inset-0 z-50 flex items-center justify-center p-4 overflow-x-hidden overflow-y-auto outline-none focus:outline-none">
  <div (click)="close.emit()" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity"></div>
  <div [class]="sizeClass" class="relative w-full mx-auto bg-white rounded-2xl shadow-xl flex flex-col max-h-[90vh]">
    <div class="flex items-center justify-between p-6 border-b border-slate-100">
      <h3 class="text-xl font-bold text-slate-900">{{ title }}</h3>
      <button (click)="close.emit()" class="w-9 h-9 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center text-slate-400 hover:text-slate-600 transition-all">
        <i class="fas fa-times text-sm"></i>
      </button>
    </div>
    <div class="flex-1 p-6 overflow-y-auto">
      <ng-content></ng-content>
    </div>
    @if (showFooter) {
      <div class="p-6 border-t border-slate-100 flex justify-end gap-3">
        <ng-content select="[footer]"></ng-content>
      </div>
    }
  </div>
</div>
